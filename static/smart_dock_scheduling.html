
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dock Scheduling - QR LEGENDS</title>
    <script src="copyright_notice.js"></script>
    <style>
        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif
            margin: 0
            padding: 20px
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh}

        .container {max-width: 1400px
            margin: 0 auto
            background: white
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);}

        .header {text-align: center
            margin-bottom: 30px
            padding-bottom: 20px
            border-bottom: 3px solid #667eea}

        .dock-grid {display: grid
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr))
            gap: 20px
            margin-bottom: 30px}

        .dock-card {background: #f8f9fa
            border-radius: 12px
            padding: 20px
            border-left: 4px solid #28a745;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);}

        .dock-card.occupied {border-left-color: #ffc107}

        .dock-card.delayed {border-left-color: #dc3545}

        .dock-header {display: flex
            justify-content: space-between
            align-items: center
            margin-bottom: 15px}

        .dock-title {font-size: 1.3rem
            font-weight: bold
            color: #333}

        .dock-status {padding: 4px 12px
            border-radius: 20px
            font-size: 0.8rem
            font-weight: bold}

        .status-available {background: #d4edda color: #155724}
        .status-occupied {background: #fff3cd color: #856404}
        .status-delayed {background: #f8d7da color: #721c24}

        .truck-info {background: white
            border-radius: 8px
            padding: 15px
            margin-top: 15px;
            border: 1px solid #e0e0e0}

        .ai-suggestion {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
            color: white
            border-radius: 8px
            padding: 15px;
            margin-top: 20px}

        .suggestion-header {font-weight: bold
            margin-bottom: 8px}

        .btn {padding: 8px 16px
            border: none
            border-radius: 6px
            cursor: pointer;
            font-weight: 500;
            margin: 5px}

        .btn-primary {background: #667eea color: white}
        .btn-success {background: #28a745 color: white}
        .btn-warning {background: #ffc107 color: #212529}

        .back-btn {position: absolute
            top: 20px
            left: 20px
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-weight: 600;
            text-decoration: none;
            color: #333}
    </style>
</head>
<body>
    <a href="/ai_warehouse_assistant" class="back-btn">← Back to AI Assistant</a>

    <div class="container">
        <div class="header">
            <h1>🚛 Smart Dock Scheduling</h1>
            <p>AI-powered dock optimization and truck scheduling</p>
        </div>

        <div class="dock-grid" id="dockGrid">
            <!-- Docks will be populated by JavaScript -->
        </div>

        <div class="ai-suggestion">
            <div class="suggestion-header">🤖 AI Recommendation</div>
            <div>Truck TR-4521 currently scheduled for Dock 3 (delayed) should be reassigned to Dock 5 for 15% faster processing. Estimated time savings: 23 minutes.</div>
            <button class="btn btn-success" onclick="implementSuggestion()">Implement Suggestion</button>
            <button class="btn btn-warning" onclick="dismissSuggestion()">Dismiss</button>
        </div>
    </div>

    <script>
        const dockData = [
            {
                id: 'dock-1',
                name: 'Dock 1',
                status: 'available',
                truck: null,
                nextScheduled: '14:30',
                capacity: 'Standard (53ft)'
            },
            {
                id: 'dock-2',
                name: 'Dock 2',
                status: 'occupied',
                truck: {
                    id: 'TR-2334',
                    driver: 'Mike Johnson',
                    eta: 'Current',
                    cargo: 'Electronics - 1,200 items',
                    completion: '78%'
                },
                capacity: 'Standard (53ft)'
            },
            {
                id: 'dock-3',
                name: 'Dock 3',
                status: 'delayed',
                truck: {
                    id: 'TR-4521',
                    driver: 'Sarah Wilson',
                    eta: '45 min late',
                    cargo: 'Appliances - 800 items',
                    completion: '12%'
                },
                capacity: 'Large (57ft)'
            },
            {
                id: 'dock-4',
                name: 'Dock 4',
                status: 'occupied',
                truck: {
                    id: 'TR-7891',
                    driver: 'Carlos Rodriguez',
                    eta: 'Current',
                    cargo: 'Furniture - 600 items',
                    completion: '34%'
                },
                capacity: 'Standard (53ft)'
            },
            {
                id: 'dock-5',
                name: 'Dock 5',
                status: 'available',
                truck: null,
                nextScheduled: '15:45',
                capacity: 'Large (57ft)'
            },
            {
                id: 'dock-6',
                name: 'Dock 6',
                status: 'available',
                truck: null,
                nextScheduled: '16:15',
                capacity: 'Standard (53ft)'
            }
        ];

        function renderDocks() {const dockGrid = document.getElementById('dockGrid')
            dockGrid.innerHTML = ''

            dockData.forEach(dock => {
                const dockCard = document.createElement('div')
                dockCard.className = `dock-card ${dock.status}`;
                
                let statusClass = 'status-available';
                if (dock.status === 'occupied') statusClass = 'status-occupied';
                if (dock.status === 'delayed') statusClass = 'status-delayed';

                let truckInfo = '';
                if (dock.truck) {
                    truckInfo = `
                        <div class="truck-info">
                            <div><strong>Truck:</strong> ${dock.truck.id}</div>
                            <div><strong>Driver:</strong> ${dock.truck.driver}</div>
                            <div><strong>ETA:</strong> ${dock.truck.eta}</div>
                            <div><strong>Cargo:</strong> ${dock.truck.cargo}</div>
                            <div><strong>Progress:</strong> ${dock.truck.completion}</div>
                            <div style="margin-top: 10px;">
                                <button class="btn btn-primary" onclick="optimizeDock('${dock.id}')">Optimize</button>
                                <button class="btn btn-warning" onclick="reassignTruck('${dock.truck.id}')">Reassign</button>
                            </div>
                        </div>
                    `;
                } else {
                    truckInfo = `
                        <div class="truck-info">
                            <div><strong>Next Scheduled:</strong> ${dock.nextScheduled}</div>
                            <div><strong>Capacity:</strong> ${dock.capacity}</div>
                            <div style="margin-top: 10px;">
                                <button class="btn btn-success" onclick="scheduleNext('${dock.id}')">Schedule Truck</button>
                            </div>
                        </div>
                    `;
                }

                dockCard.innerHTML = `
                    <div class="dock-header">
                        <div class="dock-title">${dock.name}</div>
                        <span class="dock-status ${statusClass}">${dock.status.toUpperCase()}</span>
                    </div>
                    <div><strong>Capacity:</strong> ${dock.capacity}</div>
                    ${truckInfo}
                `;

                dockGrid.appendChild(dockCard);
            });
        }

        function optimizeDock(dockId) {
            alert(`Running optimization analysis for ${dockId}...`);
        }

        function reassignTruck(truckId) {
            alert(`Analyzing optimal dock reassignment for truck ${truckId}...`);
        }

        function scheduleNext(dockId) {
            alert(`Opening scheduling interface for ${dockId}...`);
        }

        function implementSuggestion() {alert('Implementing AI suggestion: Reassigning truck TR-4521 to Dock 5...')
            // Update dock data and re-render}

        function dismissSuggestion() {alert('AI suggestion dismissed.')}

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {renderDocks()
            
            // Auto-refresh every 30 seconds
            setInterval(() => {
                console.log('Refreshing dock status...')
                // In real implementation, would fetch live data}, 30000);
        });
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backorders Management - QR Legends</title>
    <style>
        * {margin: 0 padding: 0 box-sizing: border-box}
        body {font-family: Arial, sans-serif background: #f5f5f5 padding: 20px}
        .container {max-width: 1400px margin: 0 auto background: white border-radius: 15px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);}
        .header {text-align: center margin-bottom: 30px background: linear-gradient(135deg, #e74c3c, #c0392b) color: white; padding: 20px; border-radius: 10px}
        .stats-grid {display: grid grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) gap: 20px margin-bottom: 30px}
        .stat-card {background: #f8f9fa padding: 20px border-radius: 10px text-align: center; border-left: 4px solid #e74c3c}
        .stat-value {font-size: 2rem font-weight: bold color: #e74c3c}
        .stat-label {color: #666 margin-top: 5px}
        .filters {background: #f8f9fa padding: 20px border-radius: 10px margin-bottom: 30px}
        .filter-row {display: grid grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) gap: 15px align-items: end}
        .form-group label {display: block margin-bottom: 5px font-weight: 600}
        .form-group input, .form-group select {width: 100% padding: 10px border: 1px solid #ddd border-radius: 5px}
        .btn {padding: 10px 20px border: none border-radius: 5px cursor: pointer; font-weight: 600}
        .btn-primary {background: #e74c3c color: white}
        .btn-success {background: #28a745 color: white}
        .btn-warning {background: #ffc107 color: #333}
        .btn-info {background: #17a2b8 color: white}
        .backorder-item {background: white border: 1px solid #ddd border-radius: 8px padding: 20px; margin-bottom: 15px; border-left: 4px solid #e74c3c}
        .backorder-header {display: flex justify-content: between align-items: center margin-bottom: 15px}
        .backorder-details {display: grid grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) gap: 15px}
        .priority-high {border-left-color: #dc3545}
        .priority-medium {border-left-color: #ffc107}
        .priority-low {border-left-color: #28a745}
        .actions {display: flex gap: 10px margin-top: 15px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔄 Backorders Management</h1>
            <p>Manage and track backordered items and customer orders</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalBackorders">0</div>
                <div class="stat-label">Total Backorders</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="highPriorityBackorders">0</div>
                <div class="stat-label">High Priority</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgWaitTime">0</div>
                <div class="stat-label">Avg Wait Time (Days)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="readyToShip">0</div>
                <div class="stat-label">Ready to Ship</div>
            </div>
        </div>

        <div class="filters">
            <h3>🔍 Filter Backorders</h3>
            <div class="filter-row">
                <div class="form-group">
                    <label>Customer</label>
                    <select id="customerFilter">
                        <option value="">All Customers</option>
                        <option value="CUST-001">Acme Industries</option>
                        <option value="CUST-002">Tech Solutions LLC</option>
                        <option value="CUST-003">Global Supply Co</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="priorityFilter">
                        <option value="">All Priorities</option>
                        <option value="high">High Priority</option>
                        <option value="medium">Medium Priority</option>
                        <option value="low">Low Priority</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="statusFilter">
                        <option value="">All Statuses</option>
                        <option value="pending">Pending Stock</option>
                        <option value="partial">Partial Available</option>
                        <option value="ready">Ready to Ship</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" onclick="filterBackorders()">🔍 Filter</button>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>📋 Active Backorders</h3>
            <div>
                <button class="btn btn-success" onclick="checkAllStock()">📦 Check All Stock</button>
                <button class="btn btn-info" onclick="exportBackorders()">📥 Export Report</button>
                <button class="btn btn-warning" onclick="bulkAction()">⚡ Bulk Actions</button>
            </div>
        </div>

        <div id="backordersList">
            <!-- Backorders will be populated here -->
        </div>
    </div>

    <script>
        let backorders = [];

        document.addEventListener('DOMContentLoaded', function() {loadBackorders()
            updateStats()});

        function loadBackorders() {
            // Sample backorder data
            backorders = [
                {
                    id: 'BO-2025-001',
                    order_id: 'SO-2025-015',
                    customer: 'Acme Industries',
                    customer_id: 'CUST-001',
                    item: 'Widget Set A',
                    item_id: 'ITEM-001',
                    ordered_qty: 50,
                    available_qty: 20,
                    backorder_qty: 30,
                    priority: 'high',
                    status: 'partial',
                    order_date: '2025-01-10',
                    expected_date: '2025-01-25',
                    wait_days: 8
                },
                {
                    id: 'BO-2025-002',
                    order_id: 'SO-2025-018',
                    customer: 'Tech Solutions LLC',
                    customer_id: 'CUST-002',
                    item: 'Component Pack B',
                    item_id: 'ITEM-002',
                    ordered_qty: 100,
                    available_qty: 0,
                    backorder_qty: 100,
                    priority: 'medium',
                    status: 'pending',
                    order_date: '2025-01-12',
                    expected_date: '2025-01-30',
                    wait_days: 6
                },
                {
                    id: 'BO-2025-003',
                    order_id: 'SO-2025-021',
                    customer: 'Global Supply Co',
                    customer_id: 'CUST-003',
                    item: 'Assembly Kit C',
                    item_id: 'ITEM-003',
                    ordered_qty: 25,
                    available_qty: 25,
                    backorder_qty: 0,
                    priority: 'low',
                    status: 'ready',
                    order_date: '2025-01-15',
                    expected_date: '2025-01-18',
                    wait_days: 3
                }
            ];

            displayBackorders();
        }

        function displayBackorders() {const container = document.getElementById('backordersList')
            
            if (backorders.length === 0) {
                container.innerHTML = '<div style="text-align: center padding: 50px color: #666;">No backorders found</div>';
                return}

            container.innerHTML = backorders.map(bo => `
                <div class="backorder-item priority-${bo.priority}">
                    <div class="backorder-header">
                        <div>
                            <h4>${bo.id}</h4>
                            <span style="background: ${getStatusColor(bo.status)}; color: white; padding: 4px 12px; border-radius: 15px; font-size: 12px;">${bo.status.toUpperCase()}</span>
                        </div>
                        <div>
                            <span style="background: ${getPriorityColor(bo.priority)}; color: white; padding: 4px 12px; border-radius: 15px; font-size: 12px;">${bo.priority.toUpperCase()} PRIORITY</span>
                        </div>
                    </div>
                    
                    <div class="backorder-details">
                        <div><strong>Customer:</strong> ${bo.customer}</div>
                        <div><strong>Item:</strong> ${bo.item}</div>
                        <div><strong>Order ID:</strong> ${bo.order_id}</div>
                        <div><strong>Ordered Qty:</strong> ${bo.ordered_qty}</div>
                        <div><strong>Available:</strong> ${bo.available_qty}</div>
                        <div><strong>Backorder Qty:</strong> ${bo.backorder_qty}</div>
                        <div><strong>Order Date:</strong> ${bo.order_date}</div>
                        <div><strong>Expected:</strong> ${bo.expected_date}</div>
                        <div><strong>Wait Time:</strong> ${bo.wait_days} days</div>
                    </div>
                    
                    <div class="actions">
                        <button class="btn btn-primary" onclick="checkStock('${bo.id}')">📦 Check Stock</button>
                        <button class="btn btn-success" onclick="partialShip('${bo.id}')">📤 Partial Ship</button>
                        <button class="btn btn-warning" onclick="updatePriority('${bo.id}')">⚡ Update Priority</button>
                        <button class="btn btn-info" onclick="contactCustomer('${bo.id}')">📞 Contact Customer</button>
                    </div>
                </div>
            `).join('');
        }

        function getStatusColor(status) {
            const colors = {
                'pending': '#dc3545',
                'partial': '#ffc107',
                'ready': '#28a745'
            };
            return colors[status] || '#6c757d';
        }

        function getPriorityColor(priority) {
            const colors = {
                'high': '#dc3545',
                'medium': '#ffc107',
                'low': '#28a745'
            };
            return colors[priority] || '#6c757d';
        }

        function updateStats() {const total = backorders.length
            const highPriority = backorders.filter(bo => bo.priority === 'high').length
            const readyToShip = backorders.filter(bo => bo.status === 'ready').length
            const avgWait = backorders.length > 0 ? Math.round(backorders.reduce((sum, bo) => sum + bo.wait_days, 0) / backorders.length) : 0;

            document.getElementById('totalBackorders').textContent = total;
            document.getElementById('highPriorityBackorders').textContent = highPriority;
            document.getElementById('avgWaitTime').textContent = avgWait;
            document.getElementById('readyToShip').textContent = readyToShip;}

        function filterBackorders() {const customerFilter = document.getElementById('customerFilter').value
            const priorityFilter = document.getElementById('priorityFilter').value
            const statusFilter = document.getElementById('statusFilter').value

            let filtered = backorders;

            if (customerFilter) {
                filtered = filtered.filter(bo => bo.customer_id === customerFilter);}

            if (priorityFilter) {filtered = filtered.filter(bo => bo.priority === priorityFilter)}

            if (statusFilter) {filtered = filtered.filter(bo => bo.status === statusFilter)}

            const originalBackorders = [...backorders];
            backorders = filtered;
            displayBackorders();
            updateStats();
            backorders = originalBackorders;
        }

        function checkStock(backorderId) {const backorder = backorders.find(bo => bo.id === backorderId)
            if (backorder) {
                alert(`Checking stock for ${backorder.item}...\n\nCurrent Available: ${backorder.available_qty}\nBackorder Quantity: ${backorder.backorder_qty}`);
            }
        }

        function partialShip(backorderId) {const backorder = backorders.find(bo => bo.id === backorderId)
            if (backorder && backorder.available_qty > 0) {
                if (confirm(`Ship ${backorder.available_qty} units of ${backorder.item} to ${backorder.customer}?`)) {
                    alert(`Partial shipment created for ${backorder.available_qty} units`);
                    backorder.backorder_qty -= backorder.available_qty;
                    backorder.available_qty = 0;
                    if (backorder.backorder_qty === 0) {backorder.status = 'ready'}
                    displayBackorders();
                    updateStats();
                }
            } else {alert('No stock available for partial shipment')}
        }

        function updatePriority(backorderId) {const newPriority = prompt('Enter new priority (high, medium, low):')
            if (newPriority && ['high', 'medium', 'low'].includes(newPriority)) {
                const backorder = backorders.find(bo => bo.id === backorderId)
                if (backorder) {
                    backorder.priority = newPriority
                    displayBackorders();
                    updateStats();
                    alert(`Priority updated to ${newPriority}`);
                }
            }
        }

        function contactCustomer(backorderId) {const backorder = backorders.find(bo => bo.id === backorderId)
            if (backorder) {
                alert(`Contacting ${backorder.customer} about backorder ${backorderId}...\n\nEmail template opened with backorder details.`);
            }
        }

        function checkAllStock() {alert('Checking stock levels for all backordered items...\n\n✅ Stock check complete\n📦 3 items now have available stock\n📧 Notifications sent to sales team')}

        function exportBackorders() {const csvContent = "data:text/csvcharset=utf-8," + 
                "Backorder ID,Order ID,Customer,Item,Ordered Qty,Available Qty,Backorder Qty,Priority,Status,Wait Days\n" +
                backorders.map(bo => 
                    `${bo.id},${bo.order_id},${bo.customer},${bo.item},${bo.ordered_qty},${bo.available_qty},${bo.backorder_qty},${bo.priority},${bo.status},${bo.wait_days}`
                ).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "backorders_report.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function bulkAction() {const action = prompt('Select bulk action:\n1. Update Priority\n2. Check All Stock\n3. Send Customer Updates\n\nEnter number:')
            
            switch(action) {
                case '1':
                    const priority = prompt('Enter priority for all items (high, medium, low):')
                    if (priority && ['high', 'medium', 'low'].includes(priority)) {
                        backorders.forEach(bo => bo.priority = priority)
                        displayBackorders();
                        alert(`All backorders updated to ${priority} priority`);
                    }
                    break;
                case '2':
                    alert('Bulk stock check initiated...\n📦 Checking all items\n⏰ This may take a few minutes');
                    break;
                case '3':
                    alert('Sending update emails to all customers...\n📧 Email notifications sent');
                    break;
                default:
                    alert('Invalid selection');
            }
        }
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Manager Widget - QR Legends</title>
    <style>
        * {margin: 0
            padding: 0
            box-sizing: border-box}

        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
            min-height: 100vh
            padding: 10px;
            color: #333}

        .widget-container {max-width: 1200px
            margin: 0 auto
            background: rgba(255, 255, 255, 0.95)
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);}

        .widget-header {display: flex
            align-items: center
            justify-content: space-between
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e9ecef}

        .widget-title {font-size: 28px
            font-weight: 700
            color: #667eea
            display: flex;
            align-items: center;
            gap: 10px}

        .branch-selector {padding: 8px 16px
            border: 2px solid #667eea
            border-radius: 12px
            background: white;
            font-size: 14px;
            font-weight: 500;
            color: #667eea;
            cursor: pointer}

        .metrics-grid {display: grid
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr))
            gap: 20px
            margin-bottom: 30px}

        .metric-card {background: linear-gradient(135deg, #667eea, #764ba2)
            border-radius: 15px
            padding: 20px
            text-align: center;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease}

        .metric-card:hover {transform: translateY(-5px)}

        .metric-card.warning {background: linear-gradient(135deg, #f093fb, #f5576c)}

        .metric-card.good {background: linear-gradient(135deg, #4facfe, #00f2fe)}

        .metric-card.excellent {background: linear-gradient(135deg, #43e97b, #38f9d7)}

        .metric-value {font-size: 32px
            font-weight: 700
            margin-bottom: 8px}

        .metric-label {font-size: 14px
            opacity: 0.9
            margin-bottom: 4px}

        .metric-change {font-size: 12px
            opacity: 0.8}

        .dashboard-sections {display: grid
            grid-template-columns: 2fr 1fr
            gap: 30px
            margin-bottom: 30px}

        .section-card {background: white
            border-radius: 15px
            padding: 25px
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);}

        .section-title {font-size: 20px
            font-weight: 600
            color: #667eea
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px}

        .staff-member {display: flex
            align-items: center
            justify-content: space-between
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px}

        .staff-info {display: flex
            align-items: center
            gap: 12px}

        .staff-avatar {width: 40px
            height: 40px
            border-radius: 50%
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600}

        .staff-details h4 {font-size: 14px
            font-weight: 600
            margin-bottom: 2px}

        .staff-details p {font-size: 12px
            color: #666}

        .status-badge {padding: 4px 10px
            border-radius: 20px
            font-size: 11px
            font-weight: 600}

        .status-online {background: #d1fae5
            color: #065f46}

        .status-break {background: #fef3c7
            color: #92400e}

        .status-offline {background: #fee2e2
            color: #991b1b}

        .alert-item {padding: 15px
            background: #fff3cd
            border: 1px solid #ffeaa7
            border-radius: 10px;
            margin-bottom: 12px}

        .alert-item.critical {background: #f8d7da
            border-color: #f5c6cb}

        .alert-item.success {background: #d1fae5
            border-color: #a7f3d0}

        .alert-time {font-size: 11px
            color: #666
            font-weight: 500}

        .alert-text {font-size: 13px
            margin-top: 4px
            font-weight: 500}

        .quick-actions {display: grid
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr))
            gap: 15px
            margin-top: 20px}

        .action-btn {background: linear-gradient(135deg, #667eea, #764ba2)
            color: white
            border: none
            border-radius: 12px;
            padding: 15px 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px}

        .action-btn:hover {transform: translateY(-2px)
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4)}

        .action-icon {font-size: 20px}

        .performance-chart {background: white
            border-radius: 15px
            padding: 25px
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);}

        .chart-placeholder {height: 200px
            background: linear-gradient(135deg, #f8f9fa, #e9ecef)
            border-radius: 10px
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 16px;
            font-weight: 500}

        .back-btn {position: fixed
            top: 20px
            left: 20px
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease}

        .back-btn:hover {transform: translateY(-2px)
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15)}

        @media (max-width: 768px) {.dashboard-sections {
                grid-template-columns: 1fr}
            
            .metrics-grid {grid-template-columns: repeat(2, 1fr)}
            
            .quick-actions {grid-template-columns: repeat(2, 1fr)}
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='/main_dashboard'">← Dashboard</button>

    <div class="widget-container">
        <div class="widget-header">
            <h1 class="widget-title">
                🏢 Branch Manager Dashboard
            </h1>
            <select class="branch-selector" id="branchSelector" onchange="switchBranch()">
                <option value="main-hq">Main HQ - Columbus</option>
                <option value="north">North Branch - Detroit</option>
                <option value="south">South Branch - Atlanta</option>
                <option value="east">East Branch - Philadelphia</option>
                <option value="west">West Branch - Phoenix</option>
                <option value="central">Central Branch - Chicago</option>
            </select>
        </div>

        <!-- Key Performance Metrics -->
        <div class="metrics-grid" id="metricsGrid">
            <!-- Metrics will be populated by JavaScript -->
        </div>

        <!-- Main Dashboard Sections -->
        <div class="dashboard-sections">
            <!-- Staff Overview -->
            <div class="section-card">
                <h3 class="section-title">👥 Staff Overview</h3>
                <div id="staffList">
                    <!-- Staff members will be populated by JavaScript -->
                </div>
            </div>

            <!-- Branch Alerts -->
            <div class="section-card">
                <h3 class="section-title">🚨 Branch Alerts</h3>
                <div id="alertsList">
                    <!-- Alerts will be populated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Performance Chart -->
        <div class="performance-chart">
            <h3 class="section-title">📈 Hourly Performance Trend</h3>
            <div class="chart-placeholder">
                Performance chart will be displayed here
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="action-btn" onclick="viewDetailedMetrics()">
                <span class="action-icon">📊</span>
                Detailed Metrics
            </button>
            <button class="action-btn" onclick="manageStaff()">
                <span class="action-icon">👨‍💼</span>
                Manage Staff
            </button>
            <button class="action-btn" onclick="viewInventory()">
                <span class="action-icon">📦</span>
                Inventory Status
            </button>
            <button class="action-btn" onclick="scheduleShifts()">
                <span class="action-icon">📅</span>
                Schedule Shifts
            </button>
            <button class="action-btn" onclick="generateReports()">
                <span class="action-icon">📋</span>
                Generate Reports
            </button>
            <button class="action-btn" onclick="contactRegional()">
                <span class="action-icon">📞</span>
                Contact Regional
            </button>
            <button class="action-btn" onclick="viewSecurityCameras()">
                <span class="action-icon">📹</span>
                Security Cameras
            </button>
        </div>
    </div>

    <script>
        let currentBranch = 'main-hq';
        
        // Branch data with performance metrics and staff
        const branchData = {
            'main-hq': {
                name: 'Main HQ',
                location: 'Columbus, OH',
                metrics: {
                    dailyOrders: { value: 324, status: 'excellent', change: '+12% vs yesterday' },
                    accuracy: { value: '99.2%', status: 'excellent', change: '+0.3% this week' },
                    efficiency: { value: '96%', status: 'excellent', change: '+2% this month' },
                    staffUtilization: { value: '89%', status: 'good', change: 'Optimal level' },
                    issues: { value: 1, status: 'excellent', change: 'Minor issue resolved' }
                },
                staff: [
                    { name: 'Mike Chen', role: 'Supervisor', status: 'online', avatar: 'MC' },
                    { name: 'Lisa Rodriguez', role: 'Picker Lead', status: 'online', avatar: 'LR' },
                    { name: 'David Kim', role: 'Inventory Specialist', status: 'break', avatar: 'DK' },
                    { name: 'Jennifer Walsh', role: 'Shipping Coordinator', status: 'online', avatar: 'JW' },
                    { name: 'Robert Johnson', role: 'Receiver', status: 'online', avatar: 'RJ' }
                ],
                alerts: [
                    { time: '2 hours ago', text: 'Peak efficiency achieved at 96%', type: 'success' },
                    { time: '4 hours ago', text: 'Daily order target exceeded by 22%', type: 'success' },
                    { time: '6 hours ago', text: 'Minor scanner issue in Zone C - resolved', type: 'normal' }
                ]
            },
            'north': {
                name: 'North Branch',
                location: 'Detroit, MI',
                metrics: {
                    dailyOrders: { value: 156, status: 'good', change: '+4% vs yesterday' },
                    accuracy: { value: '97.8%', status: 'warning', change: '-0.2% needs attention' },
                    efficiency: { value: '89%', status: 'warning', change: 'Below target 90%' },
                    staffUtilization: { value: '92%', status: 'good', change: 'Good utilization' },
                    issues: { value: 2, status: 'warning', change: '1 training issue' }
                },
                staff: [
                    { name: 'Sarah Miller', role: 'Branch Supervisor', status: 'online', avatar: 'SM' },
                    { name: 'Tom Anderson', role: 'Lead Picker', status: 'online', avatar: 'TA' },
                    { name: 'Maria Garcia', role: 'Inventory Clerk', status: 'online', avatar: 'MG' },
                    { name: 'James Wilson', role: 'Shipping Tech', status: 'break', avatar: 'JW' }
                ],
                alerts: [
                    { time: '1 hour ago', text: 'New team member onboarded successfully', type: 'success' },
                    { time: '3 hours ago', text: 'Accuracy below target - investigating', type: 'warning' },
                    { time: '5 hours ago', text: 'Training session scheduled for tomorrow', type: 'normal' }
                ]
            }
            // Add more branches as needed
        };

        function updateMetrics() {const data = branchData[currentBranch]
            const metricsGrid = document.getElementById('metricsGrid')
            
            metricsGrid.innerHTML = `
                <div class="metric-card ${data.metrics.dailyOrders.status}">
                    <div class="metric-value">${data.metrics.dailyOrders.value}</div>
                    <div class="metric-label">Daily Orders</div>
                    <div class="metric-change">${data.metrics.dailyOrders.change}</div>
                </div>
                <div class="metric-card ${data.metrics.accuracy.status}">
                    <div class="metric-value">${data.metrics.accuracy.value}</div>
                    <div class="metric-label">Accuracy Rate</div>
                    <div class="metric-change">${data.metrics.accuracy.change}</div>
                </div>
                <div class="metric-card ${data.metrics.efficiency.status}">
                    <div class="metric-value">${data.metrics.efficiency.value}</div>
                    <div class="metric-label">Efficiency</div>
                    <div class="metric-change">${data.metrics.efficiency.change}</div>
                </div>
                <div class="metric-card ${data.metrics.staffUtilization.status}">
                    <div class="metric-value">${data.metrics.staffUtilization.value}</div>
                    <div class="metric-label">Staff Utilization</div>
                    <div class="metric-change">${data.metrics.staffUtilization.change}</div>
                </div>
                <div class="metric-card ${data.metrics.issues.status}">
                    <div class="metric-value">${data.metrics.issues.value}</div>
                    <div class="metric-label">Active Issues</div>
                    <div class="metric-change">${data.metrics.issues.change}</div>
                </div>
            `;
        }

        function updateStaffList() {const data = branchData[currentBranch]
            const staffList = document.getElementById('staffList')
            
            staffList.innerHTML = data.staff.map(member => `
                <div class="staff-member">
                    <div class="staff-info">
                        <div class="staff-avatar">${member.avatar}</div>
                        <div class="staff-details">
                            <h4>${member.name}</h4>
                            <p>${member.role}</p>
                        </div>
                    </div>
                    <span class="status-badge status-${member.status}">${member.status}</span>
                </div>
            `).join('');
        }

        function updateAlerts() {const data = branchData[currentBranch]
            const alertsList = document.getElementById('alertsList')
            
            alertsList.innerHTML = data.alerts.map(alert => `
                <div class="alert-item ${alert.type === 'warning' ? 'critical' : alert.type === 'success' ? 'success' : ''}">
                    <div class="alert-time">${alert.time}</div>
                    <div class="alert-text">${alert.text}</div>
                </div>
            `).join('');
        }

        function switchBranch() {const selector = document.getElementById('branchSelector')
            currentBranch = selector.value
            updateDashboard()}

        function updateDashboard() {updateMetrics()
            updateStaffList()
            updateAlerts()}

        // Quick action functions
        function viewDetailedMetrics() {
            window.location.href = `/analytics_dashboard?branch=${currentBranch}`;
        }

        function manageStaff() {
            window.location.href = `/employee_management?branch=${currentBranch}`;
        }

        function viewInventory() {
            window.location.href = `/inventory_hub?branch=${currentBranch}`;
        }

        function scheduleShifts() {
            window.location.href = `/labor_management?branch=${currentBranch}`;
        }

        function generateReports() {
            window.location.href = `/reports_hub?branch=${currentBranch}`;
        }

        function contactRegional() {window.location.href = `/employee_messaging?contact=regional`}

        function viewSecurityCameras() {window.location.href = '/branch_security_cameras'}

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {updateDashboard()
            
            // Auto-refresh every 5 minutes
            setInterval(updateDashboard, 300000)});
    </script>

    <!-- Include Universal Dashboard Button -->
    <script src="/universal_dashboard_button.js"></script>
    <!-- Include Floating Chat Widget -->
    <script src="/floating_chat_widget.js"></script>
    <!-- Include Employee Messaging Widget -->
    <script src="/employee_messaging_widget.js"></script>
</body>
</html>

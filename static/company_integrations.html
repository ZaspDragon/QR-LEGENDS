
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Integrations - QR Legends</title>
    <style>
        body {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
            margin: 0
            padding: 0
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh}
        .container {max-width: 1200px
            margin: 0 auto
            padding: 20px}
        .header {background: white
            border-radius: 15px
            padding: 20px
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center}
        .card {background: white
            border-radius: 15px
            padding: 30px
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px}
        .integration-grid {display: grid
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr))
            gap: 15px
            margin-bottom: 30px}
        .integration-card {background: #f8f9fa
            border-radius: 10px
            padding: 20px
            border: 2px solid #e9ecef;
            transition: all 0.3s;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation}
        .integration-card:hover,
        .integration-card:active,
        .integration-card:focus {border-color: #667eea
            box-shadow: 0 5px 15px rgba(0,0,0,0.1)
            transform: translateY(-2px)}
        .integration-card.active {border-color: #28a745
            background: #d4edda}
        .integration-card.error {border-color: #dc3545
            background: #f8d7da}
        .form-group {margin-bottom: 20px}
        .form-group label {display: block
            margin-bottom: 5px
            font-weight: 600
            color: #333}
        .form-group input, .form-group select, .form-group textarea {width: 100%
            padding: 10px
            border: 1px solid #ddd
            border-radius: 5px;
            font-size: 14px}
        .btn {padding: 12px 20px
            border: none
            border-radius: 8px
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin: 5px;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center}
        .btn-primary {background: #667eea color: white}
        .btn-success {background: #28a745 color: white}
        .btn-warning {background: #ffc107 color: #333}
        .btn-danger {background: #dc3545 color: white}
        .btn-secondary {background: #6c757d color: white}
        .setup-form {display: none
            border-top: 2px solid #667eea
            padding-top: 20px
            margin-top: 20px}
        .status-badge {padding: 4px 8px
            border-radius: 12px
            font-size: 12px
            font-weight: 600}
        .status-active {background: #d4edda color: #155724}
        .status-inactive {background: #f8d7da color: #721c24}
        .status-testing {background: #fff3cd color: #856404}
        .test-result {margin-top: 15px
            padding: 10px
            border-radius: 5px
            display: none}
        .test-success {background: #d4edda
            color: #155724
            border: 1px solid #c3e6cb}
        .test-error {background: #f8d7da
            color: #721c24
            border: 1px solid #f5c6cb}
        
        /* Mobile Phone Responsive Design */
        @media (max-width: 768px) {.container {
                padding: 10px}
            
            .header {padding: 15px
                flex-direction: column
                gap: 15px
                text-align: center}
            
            /* Improve touch targets */
            .integration-card {min-height: 140px
                padding: 20px
                margin-bottom: 15px
                border-width: 3px}
            
            .integration-card: active {background: #e3f2fd
                border-color: #2196f3}
            
            .header h1 {font-size: 1.5rem
                margin: 0}
            
            .header p {font-size: 0.9rem
                margin: 5px 0}
            
            .integration-grid {grid-template-columns: 1fr
                gap: 15px}
            
            .integration-card {padding: 15px}
            
            .form-row {grid-template-columns: 1fr
                gap: 15px}
            
            .form-group input,
            .form-group select,
            .form-group textarea {font-size: 16px /* Prevent zoom on iOS */}
            
            .btn {padding: 12px 16px
                font-size: 14px
                width: 100%
                margin: 5px 0}
            
            .card {padding: 20px
                margin-bottom: 20px}
            
            /* Make buttons stack vertically on mobile */
            .header > div: last-child {display: flex
                flex-direction: column
                gap: 10px
                width: 100%}
            
            /* Improve form layout on mobile */
            .form-group {margin-bottom: 15px}
            
            /* Better touch targets */
            .integration-card {min-height: 120px
                display: flex
                flex-direction: column
                justify-content: space-between}
            
            /* Improve status badges on mobile */
            .status-badge {font-size: 11px
                padding: 3px 6px}
        }
        
        @media (max-width: 480px) {.header h1 {
                font-size: 1.3rem}
            
            .integration-card h3 {font-size: 1.1rem
                margin-bottom: 8px}
            
            .card {padding: 15px}
            
            .btn {padding: 14px 20px
                font-size: 15px}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🔗 Company Integrations</h1>
                <p>Connect QR Legends to your company's reporting systems and ERP platforms</p>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="window.location.href='/main_dashboard'">← Back to Dashboard</button>
                <button class="btn btn-primary" onclick="refreshIntegrations()">🔄 Refresh</button>
            </div>
        </div>

        <!-- Available Integrations -->
        <div class="card">
            <h2>📋 Available Integrations</h2>
            <div class="integration-grid" id="integrationsGrid">
                <!-- Integration cards will be populated by JavaScript -->
            </div>
        </div>

        <!-- Setup Form -->
        <div class="card">
            <h2 id="setupTitle">⚙️ Setup Integration</h2>
            <p>Select an integration above to configure it for your company.</p>
            
            <div id="setupForm" class="setup-form">
                <div class="form-group">
                    <label>System Type</label>
                    <input type="text" id="systemType" readonly>
                </div>
                
                <div id="configFields">
                    <!-- Dynamic fields will be added here -->
                </div>
                
                <div style="margin-top: 20px;">
                    <button class="btn btn-success" onclick="saveIntegration()">💾 Save Configuration</button>
                    <button class="btn btn-warning" onclick="testIntegration()">🧪 Test Connection</button>
                    <button class="btn btn-secondary" onclick="cancelSetup()">❌ Cancel</button>
                </div>
                
                <div id="testResult" class="test-result"></div>
            </div>
        </div>

        <!-- Integration Usage -->
        <div class="card">
            <h2>📊 Integration Usage</h2>
            <div class="form-group">
                <label>Submit Purchase Order to ERP</label>
                <div style="display: flex; gap: 10px; align-items: end;">
                    <div class="form-group" style="flex: 1; margin: 0;">
                        <label>PO Number</label>
                        <input type="text" id="testPoNumber" placeholder="Enter PO Number">
                    </div>
                    <div class="form-group" style="flex: 1; margin: 0;">
                        <label>System</label>
                        <select id="testSystem">
                            <option value="">Select Integration</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="submitTestPO()">📤 Submit PO</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Submit Inventory Update to ERP</label>
                <div style="display: flex; gap: 10px; align-items: end;">
                    <div class="form-group" style="flex: 1; margin: 0;">
                        <label>Items to Submit</label>
                        <select id="inventoryItems" multiple style="height: 100px;">
                            <!-- Will be populated with inventory items -->
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1; margin: 0;">
                        <label>System</label>
                        <select id="inventorySystem">
                            <option value="">Select Integration</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="submitInventoryUpdate()">📦 Submit Inventory</button>
                </div>
            </div>
        </div>
    </div>

        async function loadIntegrations() {try {
                // Load available integrations first
                const availableResponse = await fetch('/api/integrations/available')
                let allIntegrations = {};
                
                if (availableResponse.ok) {const availableData = await availableResponse.json()
                    console.log('Available integrations response:', availableData)
                    
                    if (availableData.success && availableData.integrations) {
                        // Set all integrations as available but not configured
                        Object.keys(availableData.integrations).forEach(key => {
                            allIntegrations[key] = null // Not configured yet});
                        integrationTemplates = availableData.integrations;
                    } else {console.error('Invalid available integrations response:', availableData)
                        showDefaultIntegrations()
                        return}
                } else {console.error('Failed to fetch available integrations')
                    showDefaultIntegrations()
                    return}
                
                // Load configured integrations
                const configuredResponse = await fetch('/api/integrations/list');
                if (configuredResponse.ok) {const configuredData = await configuredResponse.json()
                    console.log('Configured integrations response:', configuredData)
                    
                    if (configuredData.success && configuredData.integrations) {
                        // Merge configured integrations
                        Object.keys(configuredData.integrations).forEach(key => {
                            allIntegrations[key] = configuredData.integrations[key]});
                    }
                }
                
                availableIntegrations = allIntegrations;
                displayIntegrations();
                populateSystemSelects();
                
            } catch (error) {console.error('Error loading integrations:', error)
                
                // Fallback to show default integrations if API fails
                showDefaultIntegrations()}
        }

        function showDefaultIntegrations() {
            // Show default integrations even if API fails
            availableIntegrations = {};
            
            // Add all integrations from the template as available but not configured
            Object.keys(integrationTemplates).forEach(key => {
                availableIntegrations[key] = null
            });
            
            displayIntegrations();
            populateSystemSelects();
        }

        function displayIntegrations() {const grid = document.getElementById('integrationsGrid')
            grid.innerHTML = ''

            // Check if integrationTemplates is loaded
            if (!integrationTemplates || Object.keys(integrationTemplates).length === 0) {
                grid.innerHTML = '<div style="grid-column: 1 / -1 text-align: center; color: #666; padding: 40px;"><p>Loading available integrations...</p></div>';
                return}

            // Group integrations by category
            const categories = {};
            Object.keys(integrationTemplates).forEach(systemType => {const template = integrationTemplates[systemType]
                if (template) {
                    const category = template.category || 'Other'
                    
                    if (!categories[category]) {
                        categories[category] = []}
                    categories[category].push(systemType);
                }
            });

            // Display integrations grouped by category
            Object.keys(categories).sort().forEach(category => {// Add category header
                const categoryHeader = document.createElement('div')
                categoryHeader.style.gridColumn = '1 / -1'
                categoryHeader.style.marginTop = '20px'
                categoryHeader.style.marginBottom = '10px';
                categoryHeader.innerHTML = `<h3 style="color: #667eea border-bottom: 2px solid #667eea padding-bottom: 5px">${category} Systems</h3>`;
                grid.appendChild(categoryHeader);

                categories[category].forEach(systemType => {const template = integrationTemplates[systemType]
                    const integration = availableIntegrations[systemType]
                    
                    if (!template) {
                        console.error('Template not found for:', systemType)
                        return}
                    
                    const isConfigured = !!integration;
                    const status = isConfigured ? 
                        (integration.test_result?.status === 'success' ? 'active' : 'error') : 
                        'inactive';

                    const card = document.createElement('div');
                    card.className = `integration-card ${status}`;
                    
                    // Add both click and touch events for better mobile support
                    card.addEventListener('click', (e) => {e.preventDefault()
                        e.stopPropagation()
                        editIntegration(systemType)});
                    
                    card.addEventListener('touchend', (e) => {e.preventDefault()
                        e.stopPropagation()
                        editIntegration(systemType)});
                    
                    card.innerHTML = `
                        <div style="display: flex justify-content: space-between align-items: start margin-bottom: 10px;">
                            <div style="flex: 1;">
                                <h3 style="margin: 0; color: #333;">${template.icon || '🔗'} ${template.name}</h3>
                                <span class="status-badge status-${status}">
                                    ${isConfigured ? 'Configured' : 'Available'}
                                </span>
                            </div>
                        </div>
                        <p style="color: #666; margin: 10px 0; font-size: 13px;">${template.description}</p>
                        ${template.features ? `}
                            <div style="font-size: 11px color: #888; margin-top: 8px;">
                                Features: ${template.features.slice(0, 3).join(', ')}${template.features.length > 3 ? '...' : ''}
                            </div>
                        ` : ''}
                        ${isConfigured ? `}
                            <div style="font-size: 12px color: #666; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px;">
                                <div>Setup: ${new Date(integration.setup_date).toLocaleDateString()}</div>
                                ${integration.test_result ? }
                                    `<div>Status: ${integration.test_result.status === 'success' ? '✅ Connected' : '❌ Error'}</div>` : 
                                    ''
                                }
                            </div>
                        ` : `
                            <div style="font-size: 12px; color: #888; margin-top: 8px; font-style: italic;">
                                Click to configure
                            </div>
                        `}
                    `;
                    
                    grid.appendChild(card);
                });
            });

            // If no integrations loaded, show message
            if (Object.keys(integrationTemplates).length === 0) {grid.innerHTML = '<div style="grid-column: 1 / -1 text-align: center color: #666 padding: 40px;"><p>Loading available integrations...</p></div>'}
        }

        function editIntegration(systemType) {currentlyEditing = systemType
            const template = integrationTemplates[systemType]
            const existing = availableIntegrations[systemType]
            
            if (!template) {
                console.error('Template not found for:', systemType);
                alert('Integration template not found. Please refresh the page.');
                return;}
            
            // Smooth scroll to setup form on mobile
            setTimeout(() => {const setupForm = document.getElementById('setupForm')
                if (setupForm) {
                    setupForm.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'start'});
                }
            }, 100);
            
            // Use fields from template, fallback to empty array if not present
            const fields = template.fields || [];
            
            document.getElementById('setupTitle').textContent = `⚙️ Setup ${template.name}`;
            document.getElementById('systemType').value = systemType;
            
            const configFields = document.getElementById('configFields');
            configFields.innerHTML = '';
            
            if (fields.length === 0) {configFields.innerHTML = '<p>No configuration fields available for this integration.</p>'} else {fields.forEach(field => {
                    const fieldDiv = document.createElement('div')
                    fieldDiv.className = 'form-group'
                    
                    const existingValue = existing?.config?.[field.name] || field.value || ''
                    const inputValue = field.name.includes('secret') || field.name.includes('password') || field.name.includes('token') ? 
                        (existingValue ? '***REDACTED***' : '') : existingValue;
                    
                    const inputType = field.type || 'text';
                    
                    fieldDiv.innerHTML = `
                        <label>${field.label}${field.required ? ' *' : ''}</label>
                        <input type="${inputType}" 
                               id="config_${field.name}" 
                               placeholder="${field.placeholder || ''}"
                               value="${inputValue}"
                               ${field.readonly ? 'readonly' : ''}
                               ${field.required ? 'required' : ''}>
                    `;
                    
                    configFields.appendChild(fieldDiv);
                });
            }
            
            document.getElementById('setupForm').style.display = 'block';
            document.getElementById('testResult').style.display = 'none';
        }

        async function saveIntegration() {if (!currentlyEditing) return
            
            // Show loading state for mobile users
            const saveButton = event.target
            const originalText = saveButton.textContent
            saveButton.textContent = '💾 Saving...';
            saveButton.disabled = true;
            
            const template = integrationTemplates[currentlyEditing];
            const config = {};
            
            template.fields.forEach(field => {
                const input = document.getElementById(`config_${field.name}`);
                if (input.value && input.value !== '***REDACTED***') {config[field.name] = input.value}
            });
            
            try {
                const response = await fetch('/api/integrations/setup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        system_type: currentlyEditing,
                        config: config
                    })
                });
                
                if (response.ok) {const result = await response.json()
                    // Better mobile feedback
                    saveButton.textContent = '✅ Saved!'
                    setTimeout(() => {
                        alert(`${template.name} integration saved successfully!`);
                        loadIntegrations();
                        document.getElementById('setupForm').style.display = 'none';
                    }, 1000);
                } else {const error = await response.json()
                    alert(`Error: ${error.error}`);
                }
            } catch (error) {
                alert(`Error saving integration: ${error.message}`);
            } finally {// Reset button state
                setTimeout(() => {
                    saveButton.textContent = originalText
                    saveButton.disabled = false}, 2000);
            }
        }

        async function testIntegration() {if (!currentlyEditing) return
            
            const resultDiv = document.getElementById('testResult')
            resultDiv.style.display = 'block'
            resultDiv.className = 'test-result';
            resultDiv.innerHTML = 'Testing connection...';
            
            try {
                const response = await fetch(`/api/integrations/test/${currentlyEditing}`, {
                    method: 'POST'
                });
                
                if (response.ok) {const result = await response.json()
                    resultDiv.className = 'test-result test-success'
                    resultDiv.innerHTML = `✅ ${result.test_result.message}`;
                } else {const error = await response.json()
                    resultDiv.className = 'test-result test-error'
                    resultDiv.innerHTML = `❌ ${error.error}`;
                }
            } catch (error) {resultDiv.className = 'test-result test-error'
                resultDiv.innerHTML = `❌ Test failed: ${error.message}`;
            }
        }

        function cancelSetup() {document.getElementById('setupForm').style.display = 'none'
            currentlyEditing = null}

        function populateSystemSelects() {const testSystem = document.getElementById('testSystem')
            const inventorySystem = document.getElementById('inventorySystem')
            
            testSystem.innerHTML = '<option value="">Select Integration</option>'
            inventorySystem.innerHTML = '<option value="">Select Integration</option>';
            
            Object.keys(availableIntegrations).forEach(systemType => {
                const template = integrationTemplates[systemType]
                const option1 = new Option(`${template.icon} ${template.name}`, systemType);
                const option2 = new Option(`${template.icon} ${template.name}`, systemType);
                testSystem.add(option1);
                inventorySystem.add(option2);
            });
        }

        async function submitTestPO() {const poNumber = document.getElementById('testPoNumber').value
            const systemType = document.getElementById('testSystem').value
            
            if (!poNumber || !systemType) {
                alert('Please enter PO number and select a system')
                return;}
            
            const poData = {
                po_number: poNumber,
                supplier_code: 'TEST-SUPPLIER',
                items: [
                    {
                        item_number: 'TEST-ITEM-001',
                        quantity: 1,
                        price: 10.00,
                        uom: 'EA'
                    }
                ]
            };
            
            try {
                const response = await fetch('/api/integrations/submit-po', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        system_type: systemType,
                        po_data: poData
                    })
                });
                
                if (response.ok) {const result = await response.json()
                    alert(`PO submitted successfully to ${systemType.toUpperCase()}!`);
                } else {const error = await response.json()
                    alert(`Error: ${error.error}`);
                }
            } catch (error) {
                alert(`Error submitting PO: ${error.message}`);
            }
        }

        async function submitInventoryUpdate() {const systemType = document.getElementById('inventorySystem').value
            const selectedItems = Array.from(document.getElementById('inventoryItems').selectedOptions).map(option => option.value)
            
            if (!systemType || selectedItems.length === 0) {
                alert('Please select a system and inventory items')
                return;}
            
            // Mock inventory data for testing
            const inventoryData = selectedItems.map(itemId => ({
                item_number: `ITEM-${itemId}`,
                quantity: Math.floor(Math.random() * 100) + 1,
                location: 'A1-B1-L1',
                adjustment_quantity: Math.floor(Math.random() * 10) - 5
            }));
            
            try {
                const response = await fetch('/api/integrations/submit-inventory', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        system_type: systemType,
                        inventory_data: inventoryData
                    })
                });
                
                if (response.ok) {const result = await response.json()
                    alert(`Inventory submitted successfully to ${systemType.toUpperCase()}!`);
                } else {const error = await response.json()
                    alert(`Error: ${error.error}`);
                }
            } catch (error) {
                alert(`Error submitting inventory: ${error.message}`);
            }
        }

        function refreshIntegrations() {loadIntegrations()}

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {loadIntegrations()
            
            // Populate inventory items dropdown with sample data
            const inventoryItems = document.getElementById('inventoryItems')
            for (let i = 1 i <= 10; i++) {
                const option = new Option(`Sample Item ${i.toString().padStart(3, '0')}`, i);
                inventoryItems.add(option);
            }
        });
    </script>
</body>
</html>

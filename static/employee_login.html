<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - QR Legends</title>
    <link rel="icon" type="image/png" href="/static/qr_legends_logo.png">
    <script src="copyright_notice.js"></script>
    <script src="auto_theme_injector.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .login-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .form-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }

        .form-links a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #060;
            border: 1px solid #cfc;
        }

        .demo-accounts {
            background: #f0f4ff;
            border: 1px solid #d0d9ff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
        }

        .demo-accounts h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .demo-accounts p {
            font-size: 12px;
            color: #666;
            margin: 2px 0;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 14px;
            line-height: 1.4;
            cursor: pointer;
            color: #333;
            margin-bottom: 20px;
        }
        
        .checkbox-container a {
            color: #667eea;
            font-weight: 600;
        }
        
        .checkbox-container a:hover {
            text-decoration: underline;
        }

        .checkbox-container input[type="checkbox"] {
            width: auto;
            margin-top: 2px;
            accent-color: #667eea;
        }

        @media (max-width: 480px) {
            .login-header {
                padding: 30px 20px;
            }
            .login-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>👨‍💼 Employee Login</h1>
            <p>Access your QR Legends workspace</p>
        </div>

        <div class="login-form">
            <div id="alertContainer"></div>

            <!-- Demo Account Info -->
            <div class="demo-accounts">
                <h3>🎯 Demo Accounts Available:</h3>
                <p><strong>Picker:</strong> picker / picker123</p>
                <p><strong>Lift Driver:</strong> liftdriver / lift123</p>
                <p><strong>Manager:</strong> manager / manager123</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="termsAgreement" required>
                        <span>I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">
                    🔓 Sign In
                </button>
            </form>

            <div class="form-links">
                <p style="color: #666; margin-bottom: 10px; font-size: 14px;">Company administrator?</p>
                <a href="/company_login">🏢 Company Login</a>
            </div>
        </div>
    </div>

    <script>
        function showAlert(message, type = 'error') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const termsAccepted = document.getElementById('termsAgreement').checked;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;

            // Validate terms acceptance
            if (!termsAccepted) {
                showAlert('You must accept the Terms of Service and Privacy Policy to continue');
                return;
            }

            submitBtn.textContent = '🔄 Signing in...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/auth/employee-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        termsAccepted: termsAccepted
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = result.redirect_url || '/main_dashboard';
                    }, 500);
                } else {
                    showAlert(result.error || 'Login failed. Please check your credentials.');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Network error. Please try again.');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        console.log('Employee login page loaded successfully');
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Messages - QR Legends</title>
    <style>
        * {margin: 0
            padding: 0
            box-sizing: border-box}

        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
            min-height: 100vh
            padding: 20px}

        .container {max-width: 1400px
            margin: 0 auto
            background: white
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            height: 90vh;
            display: flex;
            flex-direction: column}

        .header {background: linear-gradient(135deg, #667eea, #764ba2)
            color: white
            padding: 20px
            display: flex;
            justify-content: space-between;
            align-items: center}

        .chat-layout {display: flex
            flex: 1
            overflow: hidden}

        .users-sidebar {width: 300px
            background: #f8f9fa
            border-right: 1px solid #ddd
            display: flex;
            flex-direction: column}

        .search-section {padding: 15px
            border-bottom: 1px solid #ddd}

        .search-input {width: 100%
            padding: 10px
            border: 1px solid #ddd
            border-radius: 20px;
            font-size: 14px}

        .users-list {flex: 1
            overflow-y: auto}

        .user-item {padding: 15px
            cursor: pointer
            border-bottom: 1px solid #eee
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between}

        .user-item:hover {background: #e9ecef}

        .user-item.active {background: #007bff
            color: white}

        .user-item.has-unread {background: #fff3cd
            border-left: 4px solid #ffc107}

        .user-info {flex: 1}

        .user-name {font-weight: 600
            margin-bottom: 2px}

        .user-department {font-size: 12px
            opacity: 0.7}

        .last-message {font-size: 12px
            opacity: 0.8
            margin-top: 3px
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px}

        .message-indicators {display: flex
            flex-direction: column
            align-items: flex-end
            gap: 5px}

        .unread-badge {background: #dc3545
            color: white
            border-radius: 50%
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600}

        .online-status {width: 10px
            height: 10px
            border-radius: 50%
            background: #28a745}

        .offline-status {background: #6c757d}

        .last-seen {font-size: 10px
            opacity: 0.6}

        .chat-area {flex: 1
            display: flex
            flex-direction: column}

        .chat-header {padding: 15px 20px
            border-bottom: 1px solid #ddd
            background: #f8f9fa
            display: flex;
            justify-content: space-between;
            align-items: center}

        .chat-user-info h3 {margin: 0
            font-size: 18px}

        .chat-user-details {font-size: 14px
            color: #666
            margin-top: 2px}

        .chat-actions {display: flex
            gap: 10px}

        .action-btn {padding: 6px 12px
            border: 1px solid #ddd
            background: white
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s}

        .action-btn: hover {background: #007bff
            color: white
            border-color: #007bff}

        .messages-container {flex: 1
            padding: 20px
            overflow-y: auto
            background: #f9f9f9}

        .message {margin-bottom: 15px
            display: flex
            flex-direction: column}

        .message.sent {align-items: flex-end}

        .message.received {align-items: flex-start}

        .message-content {max-width: 70%
            padding: 12px 16px
            border-radius: 18px
            word-wrap: break-word;
            position: relative}

        .message.sent .message-content {background: #007bff
            color: white}

        .message.received .message-content {background: white
            color: #333
            border: 1px solid #ddd}

        .message-time {font-size: 11px
            opacity: 0.7
            margin-top: 5px
            padding: 0 5px}

        .message-status {font-size: 10px
            opacity: 0.6
            margin-top: 2px
            padding: 0 5px}

        .typing-indicator {padding: 10px 20px
            font-style: italic
            color: #666
            font-size: 14px}

        .message-input-area {padding: 15px 20px
            border-top: 1px solid #ddd
            background: white}

        .message-input-container {display: flex
            gap: 10px
            align-items: center}

        .message-input {flex: 1
            padding: 12px 16px
            border: 1px solid #ddd
            border-radius: 25px;
            font-size: 14px;
            outline: none}

        .send-btn {padding: 12px 20px
            background: #007bff
            color: white
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s}

        .send-btn:hover {background: #0056b3}

        .send-btn: disabled {background: #6c757d
            cursor: not-allowed}

        .no-selection {display: flex
            align-items: center
            justify-content: center
            height: 100%;
            color: #666;
            text-align: center}

        .btn {padding: 10px 20px
            border: none
            border-radius: 5px
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block}

        .btn-primary {background: #007bff color: white}
        .btn-secondary {background: #6c757d color: white}
        .btn: hover {opacity: 0.9 transform: translateY(-1px)}

        @media (max-width: 768px) {.chat-layout {
                flex-direction: column}
            
            .users-sidebar {width: 100%
                max-height: 200px}
            
            .message-content {max-width: 85%}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>💬 Private Messages</h1>
                <p>Direct conversations with team members</p>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="window.location.href='/employee_messaging'">← Back to Messaging</button>
                <button class="btn btn-primary" onclick="loadUsers()">🔄 Refresh</button>
            </div>
        </div>

        <div class="chat-layout">
            <div class="users-sidebar">
                <div class="search-section">
                    <input type="text" class="search-input" placeholder="Search users..." onkeyup="filterUsers(this.value)">
                </div>
                
                <div class="users-list" id="users-list">
                    <div style="padding: 20px; text-align: center; color: #666;">
                        Loading users...
                    </div>
                </div>
            </div>

            <div class="chat-area">
                <div id="no-selection" class="no-selection">
                    <div>
                        <div style="font-size: 1.2rem; margin-bottom: 10px;">💬 Select a user to start chatting</div>
                        <div style="font-size: 0.9rem;">Choose someone from the list to begin a private conversation</div>
                    </div>
                </div>

                <div id="chat-content" style="display: none; flex: 1; flex-direction: column;">
                    <div class="chat-header">
                        <div class="chat-user-info">
                            <h3 id="chat-user-name"></h3>
                            <div class="chat-user-details" id="chat-user-details"></div>
                        </div>
                        <div class="chat-actions">
                            <button class="action-btn" onclick="clearChat()">🗑️ Clear Chat</button>
                            <button class="action-btn" onclick="blockUser()">🚫 Block User</button>
                        </div>
                    </div>

                    <div class="messages-container" id="messages-container">
                        <!-- Messages will be loaded here -->
                    </div>

                    <div id="typing-indicator" class="typing-indicator" style="display: none;">
                        <span id="typing-user"></span> is typing...
                    </div>

                    <div class="message-input-area">
                        <div class="message-input-container">
                            <input type="text" class="message-input" id="message-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                            <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedUserId = null;
        let allUsers = [];
        let conversations = {};
        let typingTimeout = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {loadCurrentUser()
            loadUsers()
            
            // Auto-refresh every 10 seconds
            setInterval(() => {
                if (selectedUserId) {
                    loadMessages(selectedUserId)}
                loadUsers(); // Refresh user list for online status
            }, 10000);
        });

        async function loadCurrentUser() {try {
                const response = await fetch('/api/auth/profile')
                if (response.ok) {
                    currentUser = await response.json()}
            } catch (error) {console.error('Error loading profile:', error)}
        }

        async function loadUsers() {try {
                const response = await fetch('/api/private-messages/users')
                if (response.ok) {
                    const data = await response.json()
                    allUsers = data.users || []
                    displayUsers();} else {console.error('Failed to load users')}
            } catch (error) {console.error('Error loading users:', error)}
        }

        function displayUsers() {const container = document.getElementById('users-list')
            
            if (allUsers.length === 0) {
                container.innerHTML = '<div style="padding: 20px text-align: center color: #666;">No users found</div>';
                return}

            container.innerHTML = allUsers.map(user => {const unreadCount = getUnreadCount(user.id)
                const lastMessage = getLastMessage(user.id)
                const isOnline = user.last_seen && (Date.now() - new Date(user.last_seen).getTime()) < 300000 // 5 minutes
                
                return `
                    <div class="user-item ${selectedUserId === user.id ? 'active' : ''} ${unreadCount > 0 ? 'has-unread' : ''}" 
                         onclick="selectUser('${user.id}')">
                        <div class="user-info">
                            <div class="user-name">${user.name}</div>
                            <div class="user-department">${user.department || 'Unknown'} • ${user.role || 'Employee'}</div>
                            ${lastMessage ? `<div class="last-message">${lastMessage}</div>` : ''}
                        </div>
                        <div class="message-indicators">
                            ${unreadCount > 0 ? `<div class="unread-badge">${unreadCount}</div>` : ''}
                            <div class="online-status ${isOnline ? '' : 'offline-status'}"></div>
                            ${!isOnline && user.last_seen ? `<div class="last-seen">${formatLastSeen(user.last_seen)}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getUnreadCount(userId) {const conversation = conversations[userId]
            if (!conversation) return 0
            
            return conversation.messages.filter(msg => 
                msg.sender_id === userId && !msg.read
            ).length}

        function getLastMessage(userId) {const conversation = conversations[userId]
            if (!conversation || conversation.messages.length === 0) return null
            
            const lastMsg = conversation.messages[conversation.messages.length - 1]
            const isOwn = currentUser && lastMsg.sender_id === currentUser.user.id;
            const prefix = isOwn ? 'You: ' : '';
            
            return prefix + (lastMsg.content.length > 30 ? lastMsg.content.substring(0, 30) + '...' : lastMsg.content);}

        function formatLastSeen(lastSeen) {const now = new Date()
            const seen = new Date(lastSeen)
            const diffMs = now - seen
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            return `${diffDays}d ago`;
        }

        function selectUser(userId) {selectedUserId = userId
            const user = allUsers.find(u => u.id === userId)
            
            if (!user) return

            // Update UI
            document.getElementById('no-selection').style.display = 'none';
            document.getElementById('chat-content').style.display = 'flex';
            
            document.getElementById('chat-user-name').textContent = user.name;
            document.getElementById('chat-user-details').textContent = 
                `${user.department || 'Unknown Department'} • ${user.role || 'Employee'} • ID: ${user.employee_id || user.id}`;

            // Load messages
            loadMessages(userId);
            
            // Mark as read
            markAsRead(userId);
            
            // Update user list display
            displayUsers();
        }

        async function loadMessages(userId) {
            try {
                const response = await fetch(`/api/private-messages/${userId}`);
                if (response.ok) {const data = await response.json()
                    conversations[userId] = {
                        messages: data.messages || [],
                        lastLoaded: Date.now()};
                    displayMessages();
                } else {
                    conversations[userId] = { messages: [], lastLoaded: Date.now() };
                    displayMessages();
                }
            } catch (error) {console.error('Error loading messages:', error)
                conversations[userId] = { messages: [], lastLoaded: Date.now()};
                displayMessages();
            }
        }

        function displayMessages() {const container = document.getElementById('messages-container')
            const conversation = conversations[selectedUserId]
            
            if (!conversation || conversation.messages.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center color: #666 padding: 40px">
                        <div style="font-size: 2rem margin-bottom: 10px;">💬</div>
                        <div>No messages yet. Start the conversation!</div>
                    </div>
                `;
                return}

            container.innerHTML = conversation.messages.map(message => {const isOwn = currentUser && message.sender_id === currentUser.user.id
                const messageClass = isOwn ? 'sent' : 'received'
                
                return `
                    <div class="message ${messageClass}">
                        <div class="message-content">${message.content}</div>
                        <div class="message-time">${new Date(message.timestamp).toLocaleString()}</div>
                        ${isOwn ? `<div class="message-status">${message.read ? '✓✓' : '✓'}</div>` : ''}
                    </div>
                `;
            }).join('');

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {if (!selectedUserId) return
            
            const messageInput = document.getElementById('message-input')
            const content = messageInput.value.trim()
            
            if (!content) return;

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/private-messages/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        recipient_id: selectedUserId,
                        content: content
                    })
                });

                if (response.ok) {messageInput.value = ''
                    loadMessages(selectedUserId)
                    loadUsers() // Refresh user list to update last message} else {throw new Error('Failed to send message')}
            } catch (error) {console.error('Error sending message:', error)
                alert('Failed to send message. Please try again.')} finally {sendBtn.disabled = false}
        }

        async function markAsRead(userId) {
            try {
                await fetch(`/api/private-messages/${userId}/read`, {
                    method: 'POST'
                });
            } catch (error) {console.error('Error marking as read:', error)}
        }

        function handleKeyPress(event) {if (event.key === 'Enter') {
                sendMessage()} else {// Show typing indicator
                showTypingIndicator()}
        }

        function showTypingIndicator() {if (!selectedUserId) return
            
            // Clear existing timeout
            if (typingTimeout) {
                clearTimeout(typingTimeout)}
            
            // Send typing indicator
            fetch('/api/private-messages/typing', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    recipient_id: selectedUserId
                })
            }).catch(error => console.error('Error sending typing indicator:', error));
            
            // Clear typing after 3 seconds
            typingTimeout = setTimeout(() => {
                // Clear typing indicator
            }, 3000);
        }

        function filterUsers(searchTerm) {const userItems = document.querySelectorAll('.user-item')
            const term = searchTerm.toLowerCase()
            
            userItems.forEach(item => {
                const userName = item.querySelector('.user-name').textContent.toLowerCase()
                const userDept = item.querySelector('.user-department').textContent.toLowerCase();
                
                if (userName.includes(term) || userDept.includes(term)) {
                    item.style.display = 'flex';} else {item.style.display = 'none'}
            });
        }

        async function clearChat() {if (!selectedUserId) return
            
            if (confirm('Are you sure you want to clear this chat? This action cannot be undone.')) {
                try {
                    const response = await fetch(`/api/private-messages/${selectedUserId}/clear`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {loadMessages(selectedUserId)} else {throw new Error('Failed to clear chat')}
                } catch (error) {console.error('Error clearing chat:', error)
                    alert('Failed to clear chat. Please try again.')}
            }
        }

        async function blockUser() {if (!selectedUserId) return
            
            const user = allUsers.find(u => u.id === selectedUserId)
            if (!user) return
            
            if (confirm(`Are you sure you want to block ${user.name}? They will no longer be able to send you messages.`)) {
                try {
                    const response = await fetch(`/api/private-messages/${selectedUserId}/block`, {
                        method: 'POST'
                    });
                    
                    if (response.ok) {
                        alert(`${user.name} has been blocked.`);
                        loadUsers();
                    } else {throw new Error('Failed to block user')}
                } catch (error) {console.error('Error blocking user:', error)
                    alert('Failed to block user. Please try again.')}
            }
        }
    </script>
</body>
</html>

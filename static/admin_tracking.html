
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Tracking Dashboard - Warehouse QR Management</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .activity-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }
        .activity-item.qr_generated {
            border-left-color: #007bff;
        }
        .activity-item.printed {
            border-left-color: #6f42c1;
        }
        .activity-item.moved {
            border-left-color: #fd7e14;
        }
        .activity-item.damage_reported {
            border-left-color: #dc3545;
        }
        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .activity-type {
            font-weight: bold;
            color: #333;
        }
        .activity-time {
            color: #666;
            font-size: 0.9rem;
        }
        .activity-details {
            color: #555;
            font-size: 0.9rem;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .damage-report {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .damage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .severity-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .severity-high {
            background: #fed7d7;
            color: #c53030;
        }
        .severity-medium {
            background: #feebc8;
            color: #c05621;
        }
        .severity-low {
            background: #c6f6d5;
            color: #2f855a;
        }
        .image-preview {
            max-width: 200px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .settings-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Admin Tracking Dashboard</h1>
                <p>Monitor product activities, QR codes, and damage reports</p>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="window.location.href='/main_dashboard'">← Back to Main</button>
                <button class="btn btn-primary" onclick="refreshData()">🔄 Refresh</button>
            </div>
        </div>

        <div class="stats-grid" id="stats-grid">
            <!-- Statistics will be loaded here -->
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('activities')">📋 Recent Activities</button>
            <button class="tab" onclick="switchTab('damage')">🚨 Damage Reports</button>
            <button class="tab" onclick="switchTab('settings')">⚙️ Upload Settings</button>
        </div>

        <div id="activities-tab" class="tab-content active">
            <div id="activities-loading" class="loading">Loading activities...</div>
            <div id="activities-list" style="display: none;"></div>
        </div>

        <div id="damage-tab" class="tab-content">
            <div id="damage-loading" class="loading">Loading damage reports...</div>
            <div id="damage-list" style="display: none;"></div>
        </div>

        <div id="settings-tab" class="tab-content">
            <div class="settings-form">
                <h3>📁 File Upload Settings</h3>
                <div class="form-group">
                    <label for="upload-path">Upload Directory Path:</label>
                    <input type="text" id="upload-path" placeholder="uploads/company_name">
                </div>
                <div class="form-group">
                    <label for="max-file-size">Maximum File Size (MB):</label>
                    <input type="number" id="max-file-size" min="1" max="100" value="16">
                </div>
                <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
                <div id="settings-status" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script>
        let currentData = {
            activities: [],
            statistics: {},
            damageReports: [],
            settings: {}
        };

        async function refreshData() {await Promise.all([
                loadActivities(),
                loadDamageReports(),
                loadSettings()
            ])}

        async function loadActivities() {
            try {
                const response = await fetch('/api/admin/tracking');
                if (response.ok) {
                    const data = await response.json();
                    currentData.activities = data.activities;
                    currentData.statistics = data.statistics;
                    displayStatistics();
                    displayActivities();
                } else {
                    console.error('Failed to load activities');
                }
            } catch (error) {
                console.error('Error loading activities:', error);
            }
        }

        async function loadDamageReports() {
            try {
                const response = await fetch('/api/damage/reports');
                if (response.ok) {
                    const data = await response.json();
                    currentData.damageReports = data.reports;
                    displayDamageReports();
                } else {
                    console.error('Failed to load damage reports');
                }
            } catch (error) {
                console.error('Error loading damage reports:', error);
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/admin/upload-settings');
                if (response.ok) {
                    const data = await response.json();
                    currentData.settings = data;
                    displaySettings();
                } else {
                    console.error('Failed to load settings');
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        function displayStatistics() {
            const statsGrid = document.getElementById('stats-grid');
            const stats = currentData.statistics;
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total_activities || 0}</div>
                    <div class="stat-label">Total Activities</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.qr_codes_generated || 0}</div>
                    <div class="stat-label">QR Codes Generated</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.products_printed || 0}</div>
                    <div class="stat-label">Products Printed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.products_moved || 0}</div>
                    <div class="stat-label">Products Moved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.damage_reports || 0}</div>
                    <div class="stat-label">Damage Reports</div>
                </div>
            `;
        }

        function displayActivities() {
            const loadingDiv = document.getElementById('activities-loading');
            const listDiv = document.getElementById('activities-list');
            
            loadingDiv.style.display = 'none';
            listDiv.style.display = 'block';
            
            if (currentData.activities.length === 0) {
                listDiv.innerHTML = '<p style="text-align: center; color: #666;">No activities recorded yet.</p>';
                return;
            }
            
            listDiv.innerHTML = currentData.activities.map(activity => {
                const date = new Date(activity.timestamp).toLocaleString();
                const typeDisplay = activity.activity_type.replace('_', ' ').toUpperCase();
                
                let detailsHTML = '';
                if (activity.details) {
                    const details = activity.details;
                    if (details.qr_data) detailsHTML += `<br><strong>QR Data:</strong> ${details.qr_data}`;
                    if (details.location) detailsHTML += `<br><strong>Location:</strong> ${details.location}`;
                    if (details.severity) detailsHTML += `<br><strong>Severity:</strong> ${details.severity}`;
                }
                
                return `
                    <div class="activity-item ${activity.activity_type}">
                        <div class="activity-header">
                            <span class="activity-type">${typeDisplay}</span>
                            <span class="activity-time">${date}</span>
                        </div>
                        <div class="activity-details">
                            <strong>Product ID:</strong> ${activity.product_id}<br>
                            <strong>User:</strong> ${activity.user_id}
                            ${detailsHTML}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function displayDamageReports() {const loadingDiv = document.getElementById('damage-loading')
            const listDiv = document.getElementById('damage-list')
            
            loadingDiv.style.display = 'none';
            listDiv.style.display = 'block';
            
            if (currentData.damageReports.length === 0) {
                listDiv.innerHTML = '<p style="text-align: center; color: #666;">No damage reports filed yet.</p>';
                return}
            
            listDiv.innerHTML = currentData.damageReports.map(report => {const date = new Date(report.timestamp).toLocaleString()
                
                return `
                    <div class="damage-report">
                        <div class="damage-header">
                            <div>
                                <strong>Product: ${report.product_id}</strong>
                                <span class="severity-badge severity-${report.severity}">${report.severity.toUpperCase()}</span>
                            </div>
                            <span style="color: #666; font-size: 0.9rem;">${date}</span>
                        </div>
                        <p><strong>Location:</strong> ${report.location}</p>
                        <p><strong>Description:</strong> ${report.description}</p>
                        <p><strong>Status:</strong> ${report.status}</p>
                        <p><strong>Image:</strong> ${report.image_filename}</p>
                        <button class="btn btn-secondary" onclick="updateReportStatus('${report.id}', 'resolved')">
                            ✅ Mark Resolved
                        </button>
                    </div>
                `;
            }).join('');
        }

        function displaySettings() {document.getElementById('upload-path').value = currentData.settings.upload_path || ''
            document.getElementById('max-file-size').value = currentData.settings.max_file_size || 16}

        async function saveSettings() {const uploadPath = document.getElementById('upload-path').value
            const maxFileSize = document.getElementById('max-file-size').value
            
            try {
                const response = await fetch('/api/admin/upload-settings', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',},
                    body: JSON.stringify({
                        upload_path: uploadPath,
                        max_file_size: parseInt(maxFileSize)
                    })
                });
                
                const statusDiv = document.getElementById('settings-status');
                if (response.ok) {statusDiv.innerHTML = '<span style="color: green">✅ Settings saved successfully!</span>'} else {statusDiv.innerHTML = '<span style="color: red">❌ Failed to save settings</span>'}
                
                setTimeout(() => {statusDiv.innerHTML = ''}, 3000);
            } catch (error) {console.error('Error saving settings:', error)
                document.getElementById('settings-status').innerHTML = '<span style="color: red">❌ Network error</span>'}
        }

        async function updateReportStatus(reportId, status) {
            try {
                const response = await fetch(`/api/damage/reports/${reportId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ status: status })
                });
                
                if (response.ok) {await loadDamageReports() // Refresh the list} else {alert('Failed to update report status')}
            } catch (error) {console.error('Error updating report:', error)
                alert('Network error')}
        }

        function switchTab(tabName) {// Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active')});
            
            // Remove active class from all tabs
            document.querySelectorAll('.tab').forEach(tab => {tab.classList.remove('active')});
            
            // Show selected tab
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {refreshData()});
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Legends - Advanced Widget Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {background: #0a111f
            color: #f1f5f9
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Role definitions
        const ROLES = { 
            ADMIN: "Admin", 
            MANAGER: "Manager", 
            SUPERVISOR: "Supervisor",
            WORKER: "Worker", 
            SALES: "Sales",
            CLERK: "Clerk"
        };

        // Current user state (will be loaded from your Flask backend)
        const [currentUser, setCurrentUser] = useState(null);

        // Widget registry with QR Legends specific widgets
        const Registry = {
            qrScanActivity: {
                id: "qrScanActivity",
                title: "QR Scan Activity",
                description: "Real-time scanning activity across warehouse zones.",
                category: "Ops",
                roles: [ROLES.ADMIN, ROLES.MANAGER, ROLES.SUPERVISOR, ROLES.WORKER],
                defaultCols: 6,
                render: ({ user }) => {
                    const data = [
                        { zone: "A-01", scans: 124, lastScan: "2 min ago" },
                        { zone: "B-03", scans: 58, lastScan: "5 min ago" },
                        { zone: "C-02", scans: 89, lastScan: "1 min ago" },
                    ];
                    return (
                        <div className="space-y-2">
                            <div className="grid grid-cols-3 gap-2 text-sm">
                                <Stat label="Total Scans" value="271" />
                                <Stat label="Active Zones" value="12" />
                                <Stat label="Scan Rate" value="45/min" tone="ok" />
                            </div>
                            <table className="w-full text-sm">
                                <thead className="text-slate-400">
                                    <tr className="border-b border-slate-700/60">
                                        <th className="py-1 text-left font-medium">Zone</th>
                                        <th className="py-1 text-left font-medium">Scans</th>
                                        <th className="py-1 text-left font-medium">Last Activity</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.map((r, i) => (
                                        <tr key={i} className="border-b border-slate-800/40">
                                            <td className="py-1">{r.zone}</td>
                                            <td className="py-1">{r.scans}</td>
                                            <td className="py-1">{r.lastScan}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    );
                },
            },
            inventoryLevels: {
                id: "inventoryLevels",
                title: "Inventory Levels",
                description: "Real-time stock by zone and SKU.",
                category: "Inventory",
                roles: [ROLES.ADMIN, ROLES.MANAGER, ROLES.SUPERVISOR, ROLES.WORKER],
                defaultCols: 6,
                render: ({ user }) => {
                    const data = [
                        { sku: "QR-A-100", zone: "A", qty: 124, status: "In Stock" },
                        { sku: "QR-B-220", zone: "B", qty: 58, status: "Low Stock" },
                        { sku: "QR-C-008", zone: "C", qty: 12, status: "Critical" },
                        { sku: "QR-B-440", zone: "B", qty: 201, status: "In Stock" },
                    ];
                    return (
                        <div className="space-y-2">
                            <div className="grid grid-cols-3 gap-2 text-sm">
                                <Stat label="SKUs Tracked" value={String(data.length)} />
                                <Stat label="Low Stock" value="3" tone="warn" />
                                <Stat label="Critical" value="1" tone="danger" />
                            </div>
                            <table className="w-full text-sm">
                                <thead className="text-slate-400">
                                    <tr className="border-b border-slate-700/60">
                                        <th className="py-1 text-left font-medium">SKU</th>
                                        <th className="py-1 text-left font-medium">Zone</th>
                                        <th className="py-1 text-left font-medium">Qty</th>
                                        <th className="py-1 text-left font-medium">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.map((r, i) => (
                                        <tr key={i} className="border-b border-slate-800/40">
                                            <td className="py-1">{r.sku}</td>
                                            <td className="py-1">{r.zone}</td>
                                            <td className="py-1">{r.qty}</td>
                                            <td className="py-1">
                                                <span className={`px-2 py-1 rounded text-xs ${}
                                                    r.status === 'Critical' ? 'bg-red-900/50 text-red-300' :
                                                    r.status === 'Low Stock' ? 'bg-yellow-900/50 text-yellow-300' :
                                                    'bg-green-900/50 text-green-300'
                                                }`}>
                                                    {r.status}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    );
                },
            },
            dailyTasks: {
                id: "dailyTasks",
                title: "Daily Tasks",
                description: "Assigned work and priorities for today.",
                category: "Ops",
                roles: [ROLES.ADMIN, ROLES.MANAGER, ROLES.SUPERVISOR, ROLES.WORKER, ROLES.CLERK],
                defaultCols: 4,
                render: ({ user }) => {
                    const tasks = [
                        { task: "Cycle Count Zone A", priority: "High", due: "2:00 PM" },
                        { task: "Receiving Truck #T-184", priority: "Medium", due: "3:30 PM" },
                        { task: "Putaway Batch #PW-442", priority: "Low", due: "5:00 PM" },
                    ];
                    return (
                        <div className="space-y-2">
                            <div className="grid grid-cols-2 gap-2 text-sm">
                                <Stat label="Pending" value="3" />
                                <Stat label="Completed" value="7" tone="ok" />
                            </div>
                            <div className="space-y-2">
                                {tasks.map((task, i) => (
                                    <div key={i} className="rounded-lg border border-slate-700/60 bg-[#0f1626] p-2">
                                        <div className="flex justify-between items-start">
                                            <div className="text-sm font-medium">{task.task}</div>
                                            <span className={`px-2 py-1 rounded text-xs ${}
                                                task.priority === 'High' ? 'bg-red-900/50 text-red-300' :
                                                task.priority === 'Medium' ? 'bg-yellow-900/50 text-yellow-300' :
                                                'bg-blue-900/50 text-blue-300'
                                            }`}>
                                                {task.priority}
                                            </span>
                                        </div>
                                        <div className="text-xs text-slate-400 mt-1">Due: {task.due}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                },
            },
            qrCodeGeneration: {
                id: "qrCodeGeneration",
                title: "QR Code Generation",
                description: "Generate and manage QR codes for inventory items.",
                category: "Tools",
                roles: [ROLES.ADMIN, ROLES.MANAGER, ROLES.SUPERVISOR],
                defaultCols: 4,
                render: ({ user }) => {return (
                        <div className="space-y-3">
                            <div className="grid grid-cols-2 gap-2 text-sm">
                                <Stat label="Generated Today" value="42" />
                                <Stat label="Active Codes" value="1,284" />
                            </div>
                            <div className="space-y-2">
                                <button className="w-full bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-lg text-sm font-medium">
                                    🏷️ Generate Item QR
                                </button>
                                <button className="w-full bg-green-600 hover:bg-green-700 px-3 py-2 rounded-lg text-sm font-medium">
                                    📍 Generate Location QR
                                </button>
                                <button className="w-full bg-purple-600 hover:bg-purple-700 px-3 py-2 rounded-lg text-sm font-medium">
                                    📦 Batch Generate
                                </button>
                            </div>
                        </div>
                    )},
            },
            warehouseChat: {
                id: "warehouseChat",
                title: "Warehouse Chat",
                description: "Team communication and alerts.",
                category: "Communication",
                roles: [ROLES.ADMIN, ROLES.MANAGER, ROLES.SUPERVISOR, ROLES.WORKER, ROLES.CLERK],
                defaultCols: 6,
                render: ({ user }) => {
                    const messages = [
                        { user: "Manager Mike", message: "Truck #T-184 arriving at dock 3", time: "2 min ago" },
                        { user: "Worker Jane", message: "Cycle count complete in Zone A", time: "5 min ago" },
                        { user: "System", message: "Low inventory alert: SKU QR-C-008", time: "8 min ago" },
                    ];
                    return (
                        <div className="space-y-2">
                            <div className="grid grid-cols-3 gap-2 text-sm">
                                <Stat label="Online" value="12" tone="ok" />
                                <Stat label="Messages" value="84" />
                                <Stat label="Alerts" value="3" tone="warn" />
                            </div>
                            <div className="space-y-2 max-h-40 overflow-y-auto">
                                {messages.map((msg, i) => (
                                    <div key={i} className="rounded-lg border border-slate-700/60 bg-[#0f1626] p-2">
                                        <div className="flex justify-between items-start">
                                            <div className="text-sm font-medium text-blue-300">{msg.user}</div>
                                            <div className="text-xs text-slate-400">{msg.time}</div>
                                        </div>
                                        <div className="text-sm text-slate-200 mt-1">{msg.message}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <input 
                                    type="text" 
                                    placeholder="Type a message..." 
                                    className="flex-1 bg-[#0f1626] border border-slate-700 rounded-lg px-3 py-2 text-sm"
                                />
                                <button className="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-lg text-sm">Send</button>
                            </div>
                        </div>
                    );
                },
            },
            performanceMetrics: {
                id: "performanceMetrics",
                title: "Performance Metrics",
                description: "Warehouse efficiency and productivity stats.",
                category: "Analytics",
                roles: [ROLES.ADMIN, ROLES.MANAGER, ROLES.SUPERVISOR],
                defaultCols: 8,
                render: ({ user }) => {
                    return (
                        <div className="space-y-3">
                            <div className="grid grid-cols-4 gap-2 text-sm">
                                <Stat label="Orders/Hour" value="42" tone="ok" />
                                <Stat label="Pick Accuracy" value="98.7%" tone="ok" />
                                <Stat label="Dock Utilization" value="84%" tone="ok" />
                                <Stat label="Average Pick Time" value="1.2 min" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <div className="text-sm font-medium mb-2">Top Performers</div>
                                    <div className="space-y-1">
                                        {[
                                            { name: "John D.", picks: 187, accuracy: "99.2%" },
                                            { name: "Sarah M.", picks: 176, accuracy: "98.8%" },
                                            { name: "Mike R.", picks: 164, accuracy: "99.1%" },
                                        ].map((p, i) => (
                                            <div key={i} className="flex justify-between text-sm bg-[#0f1626] p-2 rounded">
                                                <span>{p.name}</span>
                                                <span>{p.picks} picks ({p.accuracy})</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <div className="text-sm font-medium mb-2">Zone Activity</div>
                                    <div className="space-y-1">
                                        {[
                                            { zone: "Zone A", activity: "High", orders: 45 },
                                            { zone: "Zone B", activity: "Medium", orders: 32 },
                                            { zone: "Zone C", activity: "Low", orders: 18 },
                                        ].map((z, i) => (
                                            <div key={i} className="flex justify-between text-sm bg-[#0f1626] p-2 rounded">
                                                <span>{z.zone}</span>
                                                <span className={`${}
                                                    z.activity === 'High' ? 'text-green-300' :
                                                    z.activity === 'Medium' ? 'text-yellow-300' :
                                                    'text-blue-300'
                                                }`}>
                                                    {z.orders} orders
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                },
            }
        };

        // Main Dashboard Component
        function DashboardDemo() {const [user, setUser] = useState(null)
            const [cards, setCards] = useState([])
            const [isAdding, setIsAdding] = useState(false)
            const [loading, setLoading] = useState(true);

            // Load user profile and saved widgets
            useEffect(() => {
                loadUserProfile();}, []);

            async function loadUserProfile() {try {
                    const response = await fetch('/api/auth/profile')
                    if (response.ok) {
                        const profile = await response.json()
                        setUser({
                            id: profile.user_id,
                            name: profile.username || 'User',
                            role: mapRole(profile.role),});
                        
                        // Load saved widget configuration
                        await loadUserWidgets();
                    } else {
                        // Demo user if not authenticated
                        setUser({
                            id: 'demo-user',
                            name: 'Demo User',
                            role: ROLES.WORKER,
                        });
                        setCards([
                            { id: crypto.randomUUID(), widgetId: "qrScanActivity", cols: 6 },
                            { id: crypto.randomUUID(), widgetId: "dailyTasks", cols: 6 },
                        ]);
                    }
                } catch (error) {console.error('Error loading profile:', error)
                    // Fallback to demo user
                    setUser({
                        id: 'demo-user',
                        name: 'Demo User',
                        role: ROLES.WORKER,});
                    setCards([
                        { id: crypto.randomUUID(), widgetId: "qrScanActivity", cols: 6 },
                        { id: crypto.randomUUID(), widgetId: "dailyTasks", cols: 6 },
                    ]);
                }
                setLoading(false);
            }

            async function loadUserWidgets() {try {
                    const response = await fetch('/api/user/widgets')
                    if (response.ok) {
                        const data = await response.json()
                        const widgetCards = (data.widgets || []).map(widgetId => ({
                            id: crypto.randomUUID(),
                            widgetId,
                            cols: Registry[widgetId]?.defaultCols || 6}));
                        setCards(widgetCards);
                    } else {
                        // Default widgets
                        setCards([
                            { id: crypto.randomUUID(), widgetId: "qrScanActivity", cols: 6 },
                            { id: crypto.randomUUID(), widgetId: "dailyTasks", cols: 6 },
                        ]);
                    }
                } catch (error) {console.error('Error loading widgets:', error)
                    setCards([
                        { id: crypto.randomUUID(), widgetId: "qrScanActivity", cols: 6},
                        { id: crypto.randomUUID(), widgetId: "dailyTasks", cols: 6 },
                    ]);
                }
            }

            function mapRole(backendRole) {
                const roleMap = {
                    'admin': ROLES.ADMIN,
                    'manager': ROLES.MANAGER,
                    'supervisor': ROLES.SUPERVISOR,
                    'employee': ROLES.WORKER,
                    'worker': ROLES.WORKER,
                    'sales': ROLES.SALES,
                    'clerk': ROLES.CLERK,
                };
                return roleMap[backendRole?.toLowerCase()] || ROLES.WORKER;
            }

            function removeCard(id) {setCards(c => c.filter(x => x.id !== id))
                saveWidgetConfiguration()}

            function changeCols(id, cols) {
                setCards(c => c.map(x => x.id === id ? { ...x, cols } : x));
            }

            function handleAddWidget(widgetId) {const def = Registry[widgetId]
                if (!def || !def.roles.includes(user.role)) return
                
                setCards(c => [...c, { 
                    id: crypto.randomUUID(), 
                    widgetId, 
                    cols: def.defaultCols || 4}]);
                setIsAdding(false);
                saveWidgetConfiguration();
            }

            async function saveWidgetConfiguration() {try {
                    const widgetIds = cards.map(card => card.widgetId)
                    await fetch('/api/user/widgets', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json'},
                        body: JSON.stringify({ widgets: widgetIds })
                    });
                } catch (error) {console.error('Error saving widget configuration:', error)}
            }

            if (loading) {return (
                    <div className="min-h-screen bg-[#0a111f] flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
                            <div className="text-slate-300">Loading QR Legends Dashboard...</div>
                        </div>
                    </div>
                )}

            if (!user) {
                return (
                    <div className="min-h-screen bg-[#0a111f] flex items-center justify-center">
                        <div className="text-center text-slate-300">
                            <div className="mb-4">Failed to load user profile</div>
                            <button 
                                onClick={() => window.location.reload()} 
                                className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg"
                            >
                                Retry
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#0a111f] text-slate-100">
                    {/* Top Bar */}
                    <div className="mx-auto max-w-7xl px-4 py-4">
                        <div className="flex items-center justify-between rounded-xl border border-slate-700/60 bg-[#121a2b] px-4 py-3 shadow-xl">
                            <div className="flex items-center gap-3">
                                <span className="inline-block h-2 w-2 rounded-full bg-sky-500" />
                                <div>
                                    <div className="text-slate-200 font-semibold">QR Legends — Advanced Dashboard</div>
                                    <div className="text-xs text-slate-400">Real-time warehouse management</div>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="text-right">
                                    <div className="text-sm font-medium text-slate-200">{user.name}</div>
                                    <div className="text-xs text-slate-400">{user.role}</div>
                                </div>
                                <button
                                    onClick={() => setIsAdding(true)}
                                    className="rounded-lg bg-gradient-to-b from-sky-500 to-blue-600 px-4 py-2 text-sm font-semibold"
                                >
                                    + Add Widget
                                </button>
                                <a 
                                    href="/main_dashboard" 
                                    className="rounded-lg border border-slate-700 px-3 py-2 text-sm font-medium hover:bg-slate-800"
                                >
                                    Back to Main
                                </a>
                            </div>
                        </div>
                    </div>

                    {/* Dashboard Grid */}
                    <div className="mx-auto max-w-7xl px-4 pb-16">
                        <div className="rounded-xl border border-slate-700/60 bg-[#121a2b] shadow-xl">
                            <div className="flex items-center justify-between border-b border-slate-700/60 px-4 py-3">
                                <h3 className="text-sm text-slate-300">Personalized Dashboard</h3>
                                <span className="text-xs text-slate-500">
                                    {cards.length} widgets configured
                                </span>
                            </div>

                            <div className="grid grid-cols-12 gap-3 p-3">
                                {cards.map((card) => (
                                    <CardView
                                        key={card.id}
                                        card={card}
                                        user={user}
                                        onRemove={() => removeCard(card.id)}
                                        onCols={(cols) => changeCols(card.id, cols)}
                                    />
                                ))}

                                {cards.length === 0 && (
                                    <div className="col-span-12 rounded-lg border-2 border-dashed border-slate-600/60 p-8 text-center text-slate-400">
                                        <div className="mb-2">Your dashboard is empty</div>
                                        <button 
                                            onClick={() => setIsAdding(true)}
                                            className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium"
                                        >
                                            Add Your First Widget
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Add Widget Dialog */}
                    {isAdding && (
                        <AddWidgetDialog 
                            user={user} 
                            onClose={() => setIsAdding(false)} 
                            onAdd={handleAddWidget} 
                        />
                    )}
                </div>
            );
        }

        // Card Component
        function CardView({ card, user, onRemove, onCols }) {const def = Registry[card.widgetId]
            const allowed = def?.roles.includes(user.role)
            const spanClass = useMemo(() => colsToClass(card.cols), [card.cols])

            return (
                <div className={`${spanClass} rounded-xl border border-slate-700/60 bg-[#0f1626]`}>
                    <div className="flex items-center justify-between border-b border-slate-700/60 px-3 py-2">
                        <h4 className="text-sm font-semibold text-slate-200">{def?.title ?? "Unknown"}</h4>
                        <div className="flex items-center gap-1 text-xs">
                            <button 
                                onClick={() => onCols(nextCols(card.cols, -1))} 
                                className="rounded-md border border-slate-700 px-2 py-1 hover:bg-slate-800"
                            >
                                −
                            </button>
                            <button 
                                onClick={() => onCols(nextCols(card.cols, +1))} 
                                className="rounded-md border border-slate-700 px-2 py-1 hover:bg-slate-800"
                            >
                                +
                            </button>
                            <button 
                                onClick={onRemove} 
                                className="rounded-md border border-red-500/60 px-2 py-1 text-red-300 hover:bg-red-950/50"
                            >
                                ✕
                            </button>
                        </div>
                    </div>
                    <div className="p-3">
                        {!allowed ? (
                            <div className="rounded-lg border border-red-500/40 bg-red-950/30 p-3 text-sm text-red-200">
                                🔒 You don't have permission to view this widget.
                            </div>
                        ) : def ? (
                            def.render({ user })
                        ) : (
                            <div className="text-sm text-slate-400">Widget not found.</div>
                        )}
                    </div>
                </div>
            );
        }

        // Add Widget Dialog
        function AddWidgetDialog({ user, onClose, onAdd }) {const [query, setQuery] = useState("")
            const [category, setCategory] = useState("All")
            const [hoverId, setHoverId] = useState(null)

            const widgets = useMemo(() => Object.values(Registry), []);
            const categories = useMemo(() => {
                const cats = ["All", ...new Set(widgets.map(w => w.category))];
                return cats;}, [widgets]);

            const filtered = useMemo(() => {return widgets.filter((w) => {
                    const textOk = (w.title + " " + (w.description ?? "")).toLowerCase().includes(query.toLowerCase())
                    const catOk = category === "All" ? true : w.category === category
                    return textOk && catOk});
            }, [widgets, query, category]);

            const previewDef = hoverId ? Registry[hoverId] : null;

            return (
                <div className="fixed inset-0 z-50 flex items-end md:items-center md:justify-center">
                    <div className="absolute inset-0 bg-black/60" onClick={onClose} />

                    <div className="relative z-10 grid w-full max-w-6xl grid-cols-12 gap-4 rounded-t-2xl border border-slate-700/60 bg-[#121a2b] p-4 shadow-2xl md:rounded-2xl">
                        {/* Left: Widget Catalog */}
                        <div className="col-span-12 md:col-span-7">
                            <div className="mb-3 flex items-center gap-2">
                                <input
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    placeholder="Search widgets…"
                                    className="w-full rounded-lg border border-slate-700 bg-[#0f1626] px-3 py-2 text-sm"
                                />
                                <select
                                    value={category}
                                    onChange={(e) => setCategory(e.target.value)}
                                    className="rounded-lg border border-slate-700 bg-[#0f1626] px-3 py-2 text-sm"
                                >
                                    {categories.map((c) => (
                                        <option key={c} value={c}>{c}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="max-h-96 overflow-y-auto grid grid-cols-1 gap-2 md:grid-cols-2">
                                {filtered.map((w) => {
                                    const canUse = w.roles.includes(user.role)
                                    return (
                                        <div
                                            key={w.id}
                                            onMouseEnter={() => setHoverId(w.id)}
                                            onMouseLeave={() => setHoverId(p => p === w.id ? null : p)}
                                            className="rounded-xl border border-slate-700/60 bg-[#0f1626] p-3 hover:border-slate-600"
                                        >
                                            <div className="flex items-start justify-between gap-2">
                                                <div>
                                                    <div className="font-semibold text-slate-100">{w.title}</div>
                                                    <div className="text-xs text-slate-400">{w.description}</div>
                                                </div>
                                                <PermBadge allowed={canUse} />
                                            </div>
                                            <div className="mt-3 flex items-center justify-between">
                                                <span className="text-xs text-slate-500">Category: {w.category}</span>
                                                <button
                                                    disabled={!canUse}
                                                    onClick={() => onAdd(w.id)}
                                                    className={`rounded-md px-3 py-1 text-sm font-medium ${}
                                                        canUse
                                                            ? "bg-gradient-to-b from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500"
                                                            : "border border-slate-700 text-slate-500 cursor-not-allowed"
                                                    }`}
                                                >
                                                    {canUse ? "Add" : "No Access"}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Right: Preview */}
                        <div className="col-span-12 md:col-span-5">
                            <div className="rounded-xl border border-slate-700/60 bg-[#0f1626]">
                                <div className="flex items-center justify-between border-b border-slate-700/60 px-3 py-2">
                                    <div className="text-sm text-slate-300">Live Preview</div>
                                    {previewDef && <PermBadge allowed={previewDef.roles.includes(user.role)} />}
                                </div>
                                <div className="p-3">
                                    {previewDef ? (
                                        <div>
                                            <div className="mb-2 text-sm font-medium text-slate-200">{previewDef.title}</div>
                                            <div className="rounded-lg border border-slate-700/60 bg-[#121a2b] p-3">
                                                {previewDef.render({ user })}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center text-sm text-slate-500 py-8">
                                            Hover over a widget to see a live preview
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="mt-3 flex justify-end gap-2">
                                <button 
                                    onClick={onClose} 
                                    className="rounded-lg border border-slate-700 px-4 py-2 text-sm hover:bg-slate-800"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Utility Components
        function Stat({ label, value, tone }) {const toneClass =
                tone === "ok"
                    ? "text-emerald-300"
                    : tone === "warn"
                    ? "text-amber-300"
                    : tone === "danger"
                    ? "text-rose-300"
                    : "text-slate-200"
            return (
                <div className="rounded-lg border border-slate-700/60 bg-[#0b1529] p-2">
                    <div className="text-xs text-slate-400">{label}</div>
                    <div className={`text-base font-extrabold ${toneClass}`}>{value}</div>
                </div>
            );
        }

        function PermBadge({ allowed }) {
            return (
                <span
                    className={
                        "inline-flex items-center gap-1 rounded-full border px-2 py-0.5 text-xs " +
                        (allowed
                            ? "border-emerald-500/50 bg-emerald-500/10 text-emerald-300"
                            : "border-rose-500/50 bg-rose-500/10 text-rose-300")
                    }
                >
                    {allowed ? "✓ Allowed" : "🔒 No Access"}
                </span>
            );
        }

        // Utility Functions
        function colsToClass(cols) {
            const base = {
                3: "col-span-12 md:col-span-3",
                4: "col-span-12 md:col-span-4",
                6: "col-span-12 md:col-span-6",
                8: "col-span-12 md:col-span-8",
                12: "col-span-12",
            };
            return base[cols];
        }

        function nextCols(cols, delta) {const order = [3, 4, 6, 8, 12]
            const idx = Math.max(0, Math.min(order.length - 1, order.indexOf(cols) + delta))
            return order[idx]}

        // Render the app
        ReactDOM.render(<DashboardDemo />, document.getElementById('root'));
    </script>
</body>
</html>

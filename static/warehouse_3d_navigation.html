
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Warehouse Navigation - QR Legends</title>
    <link rel="stylesheet" href="color_scheme.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        .nav-container {display: flex
            height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);}
        .nav-controls {width: 300px
            padding: 20px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;}
        .nav-viewport {flex: 1
            position: relative;}
        .control-section {margin-bottom: 20px
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border: 1px solid var(--border-color);}
        .control-section h3 {margin: 0 0 15px 0
            color: var(--accent-primary);}
        .form-group {margin-bottom: 15px}
        .form-group label {display: block
            margin-bottom: 5px;
            font-weight: 600;}
        .form-control {width: 100%
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);}
        .btn {padding: 10px 15px
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;}
        .btn:hover {background: var(--accent-secondary)}
        .btn-secondary {background: var(--bg-quaternary)
            color: var(--text-primary);}
        .location-marker {background: var(--success-color)
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
            display: inline-block;}
        .route-step {padding: 8px
            margin: 5px 0;
            background: var(--bg-primary);
            border-left: 3px solid var(--accent-primary);
            border-radius: 4px;}
        .distance-info {font-size: 12px
            color: var(--text-secondary);
            margin-top: 5px;}
        .upload-area {border: 2px dashed var(--border-color)
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;}
        .upload-area:hover {border-color: var(--accent-primary)
            background: var(--bg-primary);}
        .upload-area.dragover {border-color: var(--accent-primary)
            background: rgba(37, 99, 235, 0.1);}
        #nav-canvas {width: 100%
            height: 100%;
            background: linear-gradient(135deg, #0b1426 0%, #1e293b 100%);}
        .overlay-ui {position: absolute
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);}
        .current-position {display: flex
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;}
        .status-dot {width: 8px
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
            animation: pulse 2s infinite;}
        @keyframes pulse {0% { opacity: 1}
            50% {opacity: 0.5}
            100% {opacity: 1}
        }
        .navigation-instructions {position: absolute
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            max-width: 300px;}
        .nav-step {display: flex
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);}
        .nav-step:last-child {border-bottom: none}
        .nav-icon {width: 24px
            height: 24px;
            background: var(--accent-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;}
    </style>
</head>
<body>
    <div class="nav-container">
        <div class="nav-controls">
            <div class="control-section">
                <h3>🏠 3D Warehouse Model</h3>
                <div class="upload-area" id="modelUpload">
                    <div>📦 Drop 3D Model Here</div>
                    <div style="font-size: 12px; margin-top: 10px;">
                        Supports: GLB, GLTF, OBJ
                    </div>
                </div>
                <input type="file" id="modelFile" accept=".glb,.gltf,.obj" style="display: none;">
                <div class="form-group" style="margin-top: 15px;">
                    <label>Sample Models:</label>
                    <button class="btn btn-secondary" onclick="loadSampleWarehouse()">Load Sample Warehouse</button>
                </div>
            </div>

            <div class="control-section">
                <h3>📍 Current Position</h3>
                <div class="form-group">
                    <label>Scan QR or Select Location:</label>
                    <select class="form-control" id="currentLocation" onchange="updateCurrentPosition()">
                        <option value="">Select Current Location</option>
                        <option value="A-01-03">A-01-03 (Receiving Dock 1)</option>
                        <option value="A-05-07">A-05-07 (Pick Zone A)</option>
                        <option value="B-03-12">B-03-12 (Storage Zone B)</option>
                        <option value="B-08-15">B-08-15 (Pack Station 2)</option>
                        <option value="C-02-05">C-02-05 (Ship Dock 3)</option>
                    </select>
                </div>
                <div id="positionInfo" class="location-marker" style="display: none;">
                    📍 Position locked
                </div>
            </div>

            <div class="control-section">
                <h3>🎯 Navigation</h3>
                <div class="form-group">
                    <label>Destination:</label>
                    <select class="form-control" id="destination" onchange="calculateRoute()">
                        <option value="">Select Destination</option>
                        <option value="A-01-03">A-01-03 (Receiving Dock 1)</option>
                        <option value="A-05-07">A-05-07 (Pick Zone A)</option>
                        <option value="B-03-12">B-03-12 (Storage Zone B)</option>
                        <option value="B-08-15">B-08-15 (Pack Station 2)</option>
                        <option value="C-02-05">C-02-05 (Ship Dock 3)</option>
                        <option value="QC-01-01">QC-01-01 (Quality Check)</option>
                        <option value="SHIP-01-05">SHIP-01-05 (Shipping Stage)</option>
                    </select>
                </div>
                <button class="btn" onclick="generateRoute()" id="routeBtn" disabled>
                    🗺️ Generate Route
                </button>
                <div id="routeInfo" class="distance-info"></div>
            </div>

            <div class="control-section">
                <h3>⚙️ View Controls</h3>
                <button class="btn btn-secondary" onclick="resetCamera()">📹 Reset Camera</button>
                <button class="btn btn-secondary" onclick="toggleFirstPerson()">👁️ First Person</button>
                <button class="btn btn-secondary" onclick="toggleFloorPlan()">🗺️ Floor Plan View</button>
                <div class="form-group" style="margin-top: 15px;">
                    <label>
                        <input type="checkbox" id="showRoutes" onchange="toggleRouteVisibility()" checked> 
                        Show Active Routes
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="showLabels" onchange="toggleLocationLabels()" checked> 
                        Show Location Labels
                    </label>
                </div>
            </div>

            <div class="control-section">
                <h3>📊 Live Updates</h3>
                <div class="form-group">
                    <label>Congestion Updates:</label>
                    <button class="btn btn-secondary" onclick="simulateCongestion()">🚧 Simulate Traffic</button>
                </div>
                <div class="distance-info">
                    Last Update: <span id="lastUpdate">Never</span>
                </div>
            </div>
        </div>

        <div class="nav-viewport">
            <canvas id="nav-canvas"></canvas>
            
            <div class="overlay-ui">
                <div class="current-position">
                    <div class="status-dot"></div>
                    <span id="currentPosText">No position set</span>
                </div>
                <div style="font-size: 12px; color: var(--text-secondary);">
                    Scan any LOC QR to update position
                </div>
            </div>

            <div class="navigation-instructions" id="navInstructions" style="display: none;">
                <h4 style="margin: 0 0 10px 0;">Turn-by-Turn</h4>
                <div id="routeSteps"></div>
                <div class="distance-info" style="margin-top: 10px;">
                    Total Distance: <span id="totalDistance">0m</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let warehouseModel = null;
        let currentMarker = null;
        let destinationMarker = null;
        let routeLine = null;
        let locationLabels = [];
        let isFirstPerson = false;
        
        // Sample warehouse layout mapping
        const locationMapping = {
            'A-01-03': { x: 15, y: 0, z: 10 },
            'A-05-07': { x: 35, y: 0, z: 10 },
            'B-03-12': { x: 60, y: 0, z: 30 },
            'B-08-15': { x: 75, y: 0, z: 40 },
            'C-02-05': { x: 25, y: 0, z: 60 },
            'QC-01-01': { x: 5, y: 0, z: 5 },
            'SHIP-01-05': { x: 25, y: 0, z: 70 }
        };

        function initializeThreeJS() {const canvas = document.getElementById('nav-canvas')
            const viewport = canvas.parentElement;
            
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b1426);
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(
                75, 
                viewport.clientWidth / viewport.clientHeight, 
                0.1, 
                1000
            );
            camera.position.set(50, 30, 50);
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true});
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 50, 25);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Floor grid
            const gridHelper = new THREE.GridHelper(200, 40, 0x334155, 0x1f2937);
            scene.add(gridHelper);
            
            // Controls (will be loaded async)
            loadOrbitControls();
            
            // Add basic warehouse structure
            createBasicWarehouse();
            
            // Window resize handler
            window.addEventListener('resize', onWindowResize);
            
            // Start render loop
            animate();
        }

        async function loadOrbitControls() {
            try {
                const { OrbitControls } = await import('https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/OrbitControls.js');
                controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.target.set(50, 0, 50);
                controls.update();
            } catch (error) {console.warn('Could not load OrbitControls:', error)}
        }

        function createBasicWarehouse() {// Create basic rack structure
            const rackGeometry = new THREE.BoxGeometry(2, 8, 1)
            const rackMaterial = new THREE.MeshLambertMaterial({ color: 0x666666});
            
            // Create racks in a grid pattern
            for (let x = 0; x < 10; x++) {for (let z = 0 z < 8; z++) {
                    if ((x % 3 === 0 || x % 3 === 2) && z % 2 === 0) {
                        const rack = new THREE.Mesh(rackGeometry, rackMaterial);
                        rack.position.set(x * 10, 4, z * 12);
                        rack.castShadow = true;
                        rack.receiveShadow = true;
                        scene.add(rack);}
                }
            }
            
            // Create floor
            const floorGeometry = new THREE.PlaneGeometry(200, 200);
            const floorMaterial = new THREE.MeshLambertMaterial({ color: 0x2a3f5f });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            
            // Add location markers
            createLocationMarkers();
        }

        function createLocationMarkers() {Object.keys(locationMapping).forEach(locationId => {
                const position = locationMapping[locationId]
                
                // Create location beacon
                const beaconGeometry = new THREE.CylinderGeometry(0.5, 0.5, 2, 8)
                const beaconMaterial = new THREE.MeshLambertMaterial({ 
                    color: 0x3b82f6,
                    emissive: 0x1e40af,
                    emissiveIntensity: 0.2});
                const beacon = new THREE.Mesh(beaconGeometry, beaconMaterial);
                beacon.position.set(position.x, 1, position.z);
                beacon.userData = { locationId: locationId };
                scene.add(beacon);
                
                // Create text label (simplified - in production use proper text rendering)
                const labelGeometry = new THREE.PlaneGeometry(4, 1);
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 64;
                const context = canvas.getContext('2d');
                context.fillStyle = '#1e293b';
                context.fillRect(0, 0, 256, 64);
                context.fillStyle = '#ffffff';
                context.font = 'bold 24px Arial';
                context.textAlign = 'center';
                context.fillText(locationId, 128, 40);
                
                const labelTexture = new THREE.CanvasTexture(canvas);
                const labelMaterial = new THREE.MeshBasicMaterial({ 
                    map: labelTexture, 
                    transparent: true,
                    alphaTest: 0.1
                });
                const label = new THREE.Mesh(labelGeometry, labelMaterial);
                label.position.set(position.x, 6, position.z);
                label.lookAt(camera.position);
                scene.add(label);
                locationLabels.push(label);
            });
        }

        function updateCurrentPosition() {const locationSelect = document.getElementById('currentLocation')
            const selectedLocation = locationSelect.value;
            
            if (!selectedLocation) return;
            
            // Remove old marker
            if (currentMarker) {
                scene.remove(currentMarker);}
            
            // Create new "You Are Here" marker
            const markerGeometry = new THREE.ConeGeometry(1, 3, 8);
            const markerMaterial = new THREE.MeshLambertMaterial({ 
                color: 0x10b981,
                emissive: 0x047857,
                emissiveIntensity: 0.3
            });
            currentMarker = new THREE.Mesh(markerGeometry, markerMaterial);
            
            const position = locationMapping[selectedLocation];
            if (position) {currentMarker.position.set(position.x, 1.5, position.z)
                scene.add(currentMarker);
                
                // Update UI
                document.getElementById('currentPosText').textContent = `${selectedLocation}`;
                document.getElementById('positionInfo').style.display = 'block';
                
                // Enable route generation
                document.getElementById('routeBtn').disabled = false;
                
                // Calculate route if destination is set
                calculateRoute();
            }
        }

        function calculateRoute() {const currentLoc = document.getElementById('currentLocation').value
            const destLoc = document.getElementById('destination').value;
            
            if (!currentLoc || !destLoc) return;
            
            // Remove old destination marker
            if (destinationMarker) {
                scene.remove(destinationMarker);}
            
            // Create destination marker
            const destGeometry = new THREE.SphereGeometry(1, 16, 16);
            const destMaterial = new THREE.MeshLambertMaterial({ 
                color: 0xf59e0b,
                emissive: 0xd97706,
                emissiveIntensity: 0.3
            });
            destinationMarker = new THREE.Mesh(destGeometry, destMaterial);
            
            const destPosition = locationMapping[destLoc];
            if (destPosition) {destinationMarker.position.set(destPosition.x, 1.5, destPosition.z)
                scene.add(destinationMarker);
                
                // Animate destination marker
                const originalScale = destinationMarker.scale.clone();
                function animateDestination() {
                    const time = Date.now() * 0.003;
                    destinationMarker.scale.setScalar(originalScale.x * (1 + Math.sin(time) * 0.1));
                    requestAnimationFrame(animateDestination);}
                animateDestination();
            }
        }

        function generateRoute() {const currentLoc = document.getElementById('currentLocation').value
            const destLoc = document.getElementById('destination').value;
            
            if (!currentLoc || !destLoc) return;
            
            // Simple route calculation (in production, use A* pathfinding)
            const currentPos = locationMapping[currentLoc];
            const destPos = locationMapping[destLoc];
            
            if (!currentPos || !destPos) return;
            
            // Remove old route
            if (routeLine) {
                scene.remove(routeLine);}
            
            // Create route line
            const points = [
                new THREE.Vector3(currentPos.x, 0.5, currentPos.z),
                new THREE.Vector3(destPos.x, 0.5, destPos.z)
            ];
            
            const routeGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const routeMaterial = new THREE.LineBasicMaterial({ 
                color: 0x2563eb, 
                linewidth: 5 
            });
            routeLine = new THREE.Line(routeGeometry, routeMaterial);
            scene.add(routeLine);
            
            // Calculate distance
            const distance = Math.sqrt(
                Math.pow(destPos.x - currentPos.x, 2) + 
                Math.pow(destPos.z - currentPos.z, 2)
            );
            
            // Update UI
            document.getElementById('routeInfo').textContent = `Distance: ${distance.toFixed(1)}m`;
            document.getElementById('totalDistance').textContent = `${distance.toFixed(1)}m`;
            
            // Generate turn-by-turn instructions
            generateInstructions(currentLoc, destLoc, distance);
            
            // Show navigation instructions
            document.getElementById('navInstructions').style.display = 'block';
        }

        function generateInstructions(from, to, distance) {
            const steps = [
                { icon: '🚀', text: `Start at ${from}` },
                { icon: '➡️', text: `Head towards ${to}` },
                { icon: '🏁', text: `Arrive at ${to}` }
            ];
            
            const stepsContainer = document.getElementById('routeSteps');
            stepsContainer.innerHTML = '';
            
            steps.forEach(step => {const stepDiv = document.createElement('div')
                stepDiv.className = 'nav-step';
                stepDiv.innerHTML = `
                    <div class="nav-icon">${step.icon}</div>
                    <div>${step.text}</div>
                `;
                stepsContainer.appendChild(stepDiv);
            });
        }

        function resetCamera() {if (camera && controls) {
                camera.position.set(50, 30, 50)
                controls.target.set(50, 0, 50);
                controls.update();
                isFirstPerson = false;}
        }

        function toggleFirstPerson() {if (!currentMarker) {
                alert('Please set your current position first')
                return;}
            
            isFirstPerson = !isFirstPerson;
            
            if (isFirstPerson) {// First person view
                camera.position.copy(currentMarker.position)
                camera.position.y = 2; // Eye level
                if (destinationMarker) {
                    camera.lookAt(destinationMarker.position);}
            } else {resetCamera()}
        }

        function toggleFloorPlan() {// Top-down floor plan view
            camera.position.set(50, 100, 50)
            camera.lookAt(50, 0, 50);
            if (controls) {
                controls.target.set(50, 0, 50);
                controls.update();}
        }

        function toggleRouteVisibility() {const showRoutes = document.getElementById('showRoutes').checked
            if (routeLine) {
                routeLine.visible = showRoutes;}
        }

        function toggleLocationLabels() {const showLabels = document.getElementById('showLabels').checked
            locationLabels.forEach(label => {
                label.visible = showLabels});
        }

        function simulateCongestion() {// Simulate congestion by updating route colors
            if (routeLine) {
                routeLine.material.color.setHex(0xef4444) // Red for congested
                setTimeout(() => {
                    if (routeLine) {
                        routeLine.material.color.setHex(0x2563eb); // Back to blue}
                }, 3000);
            }
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }

        function loadSampleWarehouse() {// For demo purposes, we'll just reset the scene
            // In production, this would load a GLB/GLTF file
            alert('Sample warehouse loaded! In production, this would load your 3D rack model (GLB/GLTF/OBJ format).')}

        function onWindowResize() {const viewport = document.getElementById('nav-canvas').parentElement
            camera.aspect = viewport.clientWidth / viewport.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);}

        function animate() {requestAnimationFrame(animate)
            
            if (controls) {
                controls.update();}
            
            // Animate current position marker
            if (currentMarker) {currentMarker.rotation.y += 0.02}
            
            renderer.render(scene, camera);
        }

        // File upload handling
        document.addEventListener('DOMContentLoaded', function() {const uploadArea = document.getElementById('modelUpload')
            const fileInput = document.getElementById('modelFile');
            
            uploadArea.addEventListener('click', () => fileInput.click());
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');});
            
            uploadArea.addEventListener('dragleave', () => {uploadArea.classList.remove('dragover')});
            
            uploadArea.addEventListener('drop', (e) => {e.preventDefault()
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleModelFile(files[0]);}
            });
            
            fileInput.addEventListener('change', (e) => {if (e.target.files.length > 0) {
                    handleModelFile(e.target.files[0])}
            });
            
            // Initialize Three.js
            initializeThreeJS();
        });

        function handleModelFile(file) {const fileName = file.name.toLowerCase()
            
            if (fileName.endsWith('.glb') || fileName.endsWith('.gltf')) {
                loadGLTFModel(file);} else if (fileName.endsWith('.obj')) {loadOBJModel(file)} else {alert('Unsupported file format. Please use GLB, GLTF, or OBJ files.')}
        }

        async function loadGLTFModel(file) {
            try {
                // In a real implementation, you would use GLTFLoader
                alert(`Loading GLTF model: ${file.name}\n\nIn production, this would load your 3D warehouse model and update the location mapping.`);
            } catch (error) {console.error('Error loading GLTF model:', error)
                alert('Error loading model. Please check the file format.');}
        }

        async function loadOBJModel(file) {
            try {
                // In a real implementation, you would use OBJLoader
                alert(`Loading OBJ model: ${file.name}\n\nIn production, this would load your 3D warehouse model and update the location mapping.`);
            } catch (error) {console.error('Error loading OBJ model:', error)
                alert('Error loading model. Please check the file format.');}
        }

        // QR Code integration
        function handleQRScan(qrData) {try {
                const payload = JSON.parse(qrData)
                if (payload.type === 'LOC' && payload.loc) {
                    // Update current position from QR scan
                    const locationSelect = document.getElementById('currentLocation');
                    locationSelect.value = payload.loc;
                    updateCurrentPosition();
                    
                    // Show notification
                    alert(`Position updated to ${payload.loc} via QR scan!`);
                }
            } catch (e) {// Handle non-JSON QR codes
                const locationSelect = document.getElementById('currentLocation')
                const options = Array.from(locationSelect.options);
                const matchingOption = options.find(option => option.value.includes(qrData));
                
                if (matchingOption) {
                    locationSelect.value = matchingOption.value;
                    updateCurrentPosition();}
            }
        }

        // Expose function for QR scanner integration
        window.handleQRScan = handleQRScan;
    </script>
</body>
</html>

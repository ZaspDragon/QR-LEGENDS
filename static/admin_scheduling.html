<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Scheduling - QR Legends</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="qr_camera_scanner.js"></script>
    <script src="copyright_notice.js"></script>
    <script src="floating_chat_widget.js"></script>
    <script src="employee_messaging_widget.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0b1220 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .btn-primary {
            background: linear-gradient(45deg, #2563eb, #3b82f6);
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }
        .schedule-grid {
            display: grid;
            grid-template-columns: 100px repeat(7, 1fr);
            gap: 1px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .schedule-header {
            background: rgba(37, 99, 235, 0.3);
            padding: 0.75rem;
            font-weight: 600;
            text-align: center;
        }
        .schedule-time {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem;
            text-align: center;
            font-size: 0.9rem;
        }
        .schedule-cell {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.5rem;
            min-height: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .schedule-cell:hover {
            background: rgba(37, 99, 235, 0.2);
        }
        .shift-block {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 4px;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            margin: 2px 0;
        }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto p-6">
        <div class="mb-8">
            <h1 class="text-4xl font-bold mb-2">📅 Employee Scheduling</h1>
            <p class="text-gray-400">Manage employee shifts and work schedules</p>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <button onclick="showAddShiftModal()" class="btn-primary">
                ➕ Add Shift
            </button>
            <button onclick="generateWeeklySchedule()" class="btn-primary">
                📊 Auto-Generate Schedule
            </button>
            <button onclick="exportSchedule()" class="btn-primary">
                📥 Export Schedule
            </button>
            <button onclick="location.href='/main_dashboard'" class="btn-primary" style="background: linear-gradient(45deg, #64748b, #475569);">
                ← Back to Dashboard
            </button>
        </div>

        <!-- Week Selector -->
        <div class="card">
            <div class="flex justify-between items-center mb-4">
                <button onclick="changeWeek(-1)" class="btn-primary">← Previous Week</button>
                <h2 class="text-2xl font-bold" id="weekDisplay">Week of Dec 2-8, 2025</h2>
                <button onclick="changeWeek(1)" class="btn-primary">Next Week →</button>
            </div>
        </div>

        <!-- Schedule Grid -->
        <div class="card">
            <h3 class="text-xl font-bold mb-4">Weekly Schedule</h3>
            <div class="schedule-grid" id="scheduleGrid">
                <!-- Headers -->
                <div class="schedule-header">Time</div>
                <div class="schedule-header">Monday</div>
                <div class="schedule-header">Tuesday</div>
                <div class="schedule-header">Wednesday</div>
                <div class="schedule-header">Thursday</div>
                <div class="schedule-header">Friday</div>
                <div class="schedule-header">Saturday</div>
                <div class="schedule-header">Sunday</div>
                
                <!-- Time slots will be generated by JavaScript -->
            </div>
        </div>

        <!-- Employee Availability -->
        <div class="card">
            <h3 class="text-xl font-bold mb-4">👥 Employee Availability</h3>
            <div id="employeeList" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Add Shift Modal -->
    <div id="addShiftModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold mb-4">Add New Shift</h3>
            <form id="shiftForm" class="space-y-4">
                <div>
                    <label class="block mb-2">Employee</label>
                    <select id="shiftEmployee" class="w-full p-2 rounded bg-gray-700 text-white" required>
                        <option value="">Select employee...</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2">Day</label>
                    <select id="shiftDay" class="w-full p-2 rounded bg-gray-700 text-white" required>
                        <option value="0">Monday</option>
                        <option value="1">Tuesday</option>
                        <option value="2">Wednesday</option>
                        <option value="3">Thursday</option>
                        <option value="4">Friday</option>
                        <option value="5">Saturday</option>
                        <option value="6">Sunday</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2">Start Time</label>
                    <input type="time" id="shiftStart" class="w-full p-2 rounded bg-gray-700 text-white" required>
                </div>
                <div>
                    <label class="block mb-2">End Time</label>
                    <input type="time" id="shiftEnd" class="w-full p-2 rounded bg-gray-700 text-white" required>
                </div>
                <div class="flex gap-2">
                    <button type="submit" class="btn-primary flex-1">Add Shift</button>
                    <button type="button" onclick="hideAddShiftModal()" class="btn-primary flex-1" style="background: linear-gradient(45deg, #64748b, #475569);">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentWeekOffset = 0;
        let scheduleData = {};

        // Initialize schedule grid
        function initScheduleGrid() {
            const grid = document.getElementById('scheduleGrid');
            const startHour = 6;
            const endHour = 22;
            
            for (let hour = startHour; hour <= endHour; hour++) {
                const timeStr = `${hour.toString().padStart(2, '0')}:00`;
                grid.innerHTML += `<div class="schedule-time">${timeStr}</div>`;
                
                for (let day = 0; day < 7; day++) {
                    const cellId = `cell-${day}-${hour}`;
                    grid.innerHTML += `<div class="schedule-cell" id="${cellId}" onclick="quickAddShift(${day}, ${hour})"></div>`;
                }
            }
        }

        // Load employees
        async function loadEmployees() {
            try {
                const response = await fetch('/api/employees');
                if (response.ok) {
                    const data = await response.json();
                    const select = document.getElementById('shiftEmployee');
                    const empList = document.getElementById('employeeList');
                    
                    Object.values(data.employees || {}).forEach(emp => {
                        const option = document.createElement('option');
                        option.value = emp.id;
                        option.textContent = `${emp.first_name} ${emp.last_name} (${emp.role})`;
                        select.appendChild(option);
                        
                        empList.innerHTML += `
                            <div class="bg-gray-700 p-3 rounded">
                                <h4 class="font-bold">${emp.first_name} ${emp.last_name}</h4>
                                <p class="text-sm text-gray-400">${emp.role}</p>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                console.error('Error loading employees:', error);
            }
        }

        function showAddShiftModal() {
            document.getElementById('addShiftModal').classList.remove('hidden');
        }

        function hideAddShiftModal() {
            document.getElementById('addShiftModal').classList.add('hidden');
        }

        function quickAddShift(day, hour) {
            document.getElementById('shiftDay').value = day;
            document.getElementById('shiftStart').value = `${hour.toString().padStart(2, '0')}:00`;
            document.getElementById('shiftEnd').value = `${(hour + 8).toString().padStart(2, '0')}:00`;
            showAddShiftModal();
        }

        document.getElementById('shiftForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            alert('Shift added successfully!');
            hideAddShiftModal();
            e.target.reset();
        });

        function changeWeek(offset) {
            currentWeekOffset += offset;
            updateWeekDisplay();
        }

        function updateWeekDisplay() {
            const today = new Date();
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() + (currentWeekOffset * 7));
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 6);
            
            const options = { month: 'short', day: 'numeric' };
            document.getElementById('weekDisplay').textContent = 
                `Week of ${weekStart.toLocaleDateString('en-US', options)} - ${weekEnd.toLocaleDateString('en-US', options)}, ${weekEnd.getFullYear()}`;
        }

        function generateWeeklySchedule() {
            alert('Auto-generating weekly schedule based on employee availability and business needs...');
        }

        function exportSchedule() {
            alert('Exporting schedule to CSV...');
        }

        // Initialize
        initScheduleGrid();
        loadEmployees();
        updateWeekDisplay();
        console.log('Admin Scheduling page loaded');
    </script>
</body>
</html>

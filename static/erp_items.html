<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Master - QR LEGENDS ERP</title>
    <style>
        :root {
            --ql-primary: #667eea;
            --ql-secondary: #764ba2;
            --ql-success: #22c55e;
            --ql-bg: #0f1419;
            --ql-surface: #1a1f2e;
            --ql-text: #e5e7eb;
            --ql-sub: #9ca3af;
            --ql-border: #2d3748;
        }
        body.light {
            --ql-bg: #f8fafc;
            --ql-surface: #ffffff;
            --ql-text: #1e293b;
            --ql-sub: #64748b;
            --ql-border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--ql-bg);
            color: var(--ql-text);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }
        .ql-header {
            background: linear-gradient(135deg, var(--ql-primary) 0%, var(--ql-secondary) 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .ql-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .ql-card {
            background: var(--ql-surface);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 24px;
            border: 1px solid var(--ql-border);
        }
        .ql-btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            background: var(--ql-primary);
        }
        .ql-btn:hover { transform: translateY(-2px); }
        .ql-btn-success { background: var(--ql-success); }
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .item-card {
            background: var(--ql-bg);
            border: 1px solid var(--ql-border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .item-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .item-info {
            color: var(--ql-sub);
            font-size: 0.9rem;
            margin: 4px 0;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: var(--ql-surface);
            margin: 5% auto;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--ql-bg);
            color: var(--ql-text);
            border: 1px solid var(--ql-border);
            padding: 10px 12px;
            border-radius: 10px;
            outline: none;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .badge-active {
            background: rgba(34,197,94,0.2);
            color: var(--ql-success);
        }
        .price-tag {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--ql-success);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--ql-sub);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .ql-header h1 {
                font-size: 1.2rem !important;
            }
            
            .ql-container {
                padding: 0 1rem;
                margin: 1rem auto;
            }

            /* Touch targets */
            .ql-btn, button {
                min-height: 48px;
                padding: 12px 18px;
                font-size: 16px;
            }

            /* Better form inputs */
            input, select, textarea {
                min-height: 48px !important;
                font-size: 16px !important;
                padding: 12px 14px !important;
            }

            /* Responsive tables */
            table {
                display: block;
                overflow-x: auto;
            }

            thead {
                display: none;
            }

            tbody {
                display: block;
            }

            tr {
                display: block;
                margin-bottom: 16px;
                border: 1px solid var(--ql-border);
                border-radius: 8px;
                padding: 12px;
            }

            td {
                display: flex;
                justify-content: space-between;
                padding: 10px 0;
                border-bottom: 1px solid rgba(255,255,255,.05);
            }

            td:last-child {
                border-bottom: none;
            }

            td::before {
                content: attr(data-label);
                font-weight: bold;
                margin-right: 10px;
                color: var(--ql-sub);
            }

            /* Full width modals */
            .modal-content {
                width: 95%;
                max-width: 95%;
                margin: 20px auto;
            }

            /* Stack buttons */
            .ql-header > div {
                flex-wrap: wrap;
                gap: 12px;
            }

            /* Two-column form layout to single column */
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .modal-content {
                width: 100%;
                max-width: 100%;
                margin: 0;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
<header class="ql-header">
    <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="font-size: 1.5rem; font-weight: 600;">📦 Item Master</h1>
        <div>
            <a class="ql-btn" href="/erp_hub" style="text-decoration: none; background: rgba(255,255,255,0.2);">← ERP Hub</a>
            <button class="ql-btn ql-btn-success" onclick="openAddItemModal()">+ Add Item</button>
        </div>
    </div>
</header>

<div class="ql-container">
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
        <div class="ql-card" style="text-align: center;">
            <div style="font-size: 2rem; font-weight: 600; color: var(--ql-primary);" id="stat-total">0</div>
            <div style="color: var(--ql-sub); font-size: 0.9rem;">Total Items</div>
        </div>
        <div class="ql-card" style="text-align: center;">
            <div style="font-size: 2rem; font-weight: 600; color: var(--ql-success);" id="stat-active">0</div>
            <div style="color: var(--ql-sub); font-size: 0.9rem;">Active Items</div>
        </div>
    </div>

    <div class="ql-card">
        <input type="text" id="search-input" placeholder="Search items by name, SKU, or category..." 
               style="width: 100%; background: var(--ql-bg); color: var(--ql-text); border: 1px solid var(--ql-border); padding: 10px 12px; border-radius: 10px;" 
               onkeyup="filterItems()">
    </div>

    <div id="loading" class="loading">
        <div style="font-size: 2rem; margin-bottom: 12px;">⏳</div>
        <div>Loading items...</div>
    </div>

    <div id="items-grid" class="item-grid" style="display: none;"></div>

    <div id="empty-state" style="display: none; text-align: center; padding: 60px 20px; color: var(--ql-sub);">
        <div style="font-size: 4rem; margin-bottom: 16px; opacity: 0.3;">📭</div>
        <h3>No Items Yet</h3>
        <p>Click "Add Item" to create your first item record.</p>
    </div>
</div>

<div id="addItemModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--ql-primary); margin-bottom: 24px;">Add New Item</h2>
        <form id="itemForm" onsubmit="saveItem(event)">
            <div class="form-group">
                <label>Item Name *</label>
                <input type="text" id="item_name" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>SKU *</label>
                    <input type="text" id="sku" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="category">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="2"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Unit Cost ($)</label>
                    <input type="number" id="unit_cost" step="0.01" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Sell Price ($)</label>
                    <input type="number" id="sell_price" step="0.01" min="0" value="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Length (in)</label>
                    <input type="number" id="length" step="0.01" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Width (in)</label>
                    <input type="number" id="width" step="0.01" min="0" value="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Height (in)</label>
                    <input type="number" id="height" step="0.01" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Weight (lbs)</label>
                    <input type="number" id="weight" step="0.01" min="0" value="0">
                </div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
                <button type="button" class="ql-btn" onclick="closeAddItemModal()" style="background: var(--ql-sub);">Cancel</button>
                <button type="submit" class="ql-btn ql-btn-success">Save Item</button>
            </div>
        </form>
    </div>
</div>

<script src="/auto_theme_injector.js"></script>
<script src="/copyright_notice.js"></script>
<script>
let allItems = [];
let editingItemId = null;

document.addEventListener('DOMContentLoaded', function() {
    loadItems();
});

async function loadItems() {
    try {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('items-grid').style.display = 'none';
        document.getElementById('empty-state').style.display = 'none';

        const response = await fetch('/api/erp/items');
        
        if (!response.ok) {
            throw new Error('Failed to load items');
        }
        
        const data = await response.json();
        allItems = data.items || [];
        
        updateStats();
        displayItems(allItems);
        
    } catch (error) {
        console.error('Error loading items:', error);
        document.getElementById('loading').innerHTML = '<div style="color: #ef4444;">❌ Failed to load items</div>';
    }
}

function updateStats() {
    const total = allItems.length;
    const active = allItems.filter(i => i.status === 'active').length;
    
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
}

function displayItems(items) {
    document.getElementById('loading').style.display = 'none';
    
    if (items.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('items-grid').style.display = 'none';
        return;
    }
    
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('items-grid').style.display = 'grid';
    
    const grid = document.getElementById('items-grid');
    grid.innerHTML = items.map(item => `
        <div class="item-card">
            <div class="item-name">${item.item_name || 'Unnamed Item'}</div>
            <div class="item-info"><strong>SKU:</strong> ${item.sku || 'N/A'}</div>
            <div class="item-info"><strong>Category:</strong> ${item.category || 'N/A'}</div>
            <div class="item-info"><strong>Cost:</strong> $${(item.cost_info?.unit_cost || 0).toFixed(2)}</div>
            <div class="price-tag">$${(item.sell_price || 0).toFixed(2)}</div>
            <div style="margin-top: 12px; display: flex; gap: 8px; align-items: center;">
                <span class="badge badge-active">${item.status || 'active'}</span>
                <button class="ql-btn" style="padding: 4px 12px; font-size: 0.85rem; background: var(--ql-primary);" onclick='editItem(${JSON.stringify(item)})'>Edit</button>
                <button class="ql-btn" style="padding: 4px 12px; font-size: 0.85rem; background: #ef4444;" onclick="deleteItem('${item.item_id}', '${item.item_name}')">Delete</button>
            </div>
        </div>
    `).join('');
}

function filterItems() {
    const search = document.getElementById('search-input').value.toLowerCase();
    
    if (!search) {
        displayItems(allItems);
        return;
    }
    
    const filtered = allItems.filter(item => 
        (item.item_name || '').toLowerCase().includes(search) ||
        (item.sku || '').toLowerCase().includes(search) ||
        (item.category || '').toLowerCase().includes(search)
    );
    
    displayItems(filtered);
}

function openAddItemModal() {
    editingItemId = null;
    document.getElementById('itemForm').reset();
    document.querySelector('#addItemModal h2').textContent = 'Add New Item';
    document.getElementById('addItemModal').style.display = 'block';
}

function closeAddItemModal() {
    editingItemId = null;
    document.querySelector('#addItemModal h2').textContent = 'Add New Item';
    document.getElementById('addItemModal').style.display = 'none';
}

async function saveItem(event) {
    event.preventDefault();
    
    const itemData = {
        item_name: document.getElementById('item_name').value,
        sku: document.getElementById('sku').value,
        category: document.getElementById('category').value,
        description: document.getElementById('description').value,
        unit_cost: parseFloat(document.getElementById('unit_cost').value) || 0,
        sell_price: parseFloat(document.getElementById('sell_price').value) || 0,
        length: parseFloat(document.getElementById('length').value) || 0,
        width: parseFloat(document.getElementById('width').value) || 0,
        height: parseFloat(document.getElementById('height').value) || 0,
        weight: parseFloat(document.getElementById('weight').value) || 0
    };
    
    try {
        let url = '/api/erp/items';
        let method = 'POST';
        let successMessage = 'Item added successfully!';
        
        if (editingItemId) {
            url = `/api/erp/items/${editingItemId}`;
            method = 'PUT';
            successMessage = 'Item updated successfully!';
        }
        
        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(itemData)
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
            alert(successMessage);
            closeAddItemModal();
            editingItemId = null;
            loadItems();
        } else {
            alert('Error: ' + (data.error || 'Failed to save item'));
        }
    } catch (error) {
        console.error('Error saving item:', error);
        alert('Failed to save item. Please try again.');
    }
}

function editItem(item) {
    editingItemId = item.item_id;
    
    document.getElementById('item_name').value = item.item_name || '';
    document.getElementById('sku').value = item.sku || '';
    document.getElementById('category').value = item.category || '';
    document.getElementById('description').value = item.description || '';
    document.getElementById('unit_cost').value = item.cost_info?.unit_cost || 0;
    document.getElementById('sell_price').value = item.sell_price || 0;
    document.getElementById('length').value = item.dimensions?.length || 0;
    document.getElementById('width').value = item.dimensions?.width || 0;
    document.getElementById('height').value = item.dimensions?.height || 0;
    document.getElementById('weight').value = item.dimensions?.weight || 0;
    
    document.querySelector('#addItemModal h2').textContent = 'Edit Item';
    document.getElementById('addItemModal').style.display = 'block';
}

async function deleteItem(itemId, itemName) {
    if (!confirm(`Are you sure you want to delete ${itemName}? This action cannot be undone.`)) {
        return;
    }
    
    try {
        const response = await fetch(`/api/erp/items/${itemId}`, {
            method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
            alert('Item deleted successfully!');
            loadItems();
        } else {
            alert('Error: ' + (data.error || 'Failed to delete item'));
        }
    } catch (error) {
        console.error('Error deleting item:', error);
        alert('Failed to delete item. Please try again.');
    }
}

window.onclick = function(event) {
    const modal = document.getElementById('addItemModal');
    if (event.target == modal) {
        closeAddItemModal();
    }
}

console.log('✅ QR Legends Item Master loaded');
</script>
</body>
</html>

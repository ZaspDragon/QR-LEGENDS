
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Security Cameras - QR Legends</title>
    <style>
        * {margin: 0
            padding: 0
            box-sizing: border-box}

        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
            min-height: 100vh
            padding: 20px;
            color: #333}

        .container {max-width: 1400px
            margin: 0 auto}

        .header {background: rgba(255, 255, 255, 0.95)
            backdrop-filter: blur(10px)
            border-radius: 20px
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center}

        .header h1 {font-size: 32px
            font-weight: 700
            color: #667eea
            margin-bottom: 10px}

        .branch-selector {background: white
            border-radius: 15px
            padding: 20px
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);}

        .branch-grid {display: grid
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr))
            gap: 15px
            margin-top: 15px}

        .branch-btn {padding: 12px 20px
            border: 2px solid #667eea
            background: white
            color: #667eea;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease}

        .branch-btn: hover {background: #667eea
            color: white
            transform: translateY(-2px)}

        .branch-btn.active {background: #667eea
            color: white}

        .camera-grid {display: grid
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr))
            gap: 20px
            margin-bottom: 30px}

        .camera-card {background: white
            border-radius: 15px
            padding: 20px
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease}

        .camera-card:hover {transform: translateY(-5px)}

        .camera-header {display: flex
            justify-content: space-between
            align-items: center
            margin-bottom: 15px}

        .camera-title {font-size: 18px
            font-weight: 600
            color: #333}

        .camera-status {padding: 4px 12px
            border-radius: 20px
            font-size: 12px
            font-weight: 600}

        .status-online {background: #d1fae5
            color: #065f46}

        .status-offline {background: #fee2e2
            color: #991b1b}

        .status-maintenance {background: #fef3c7
            color: #92400e}

        .camera-feed {width: 100%
            height: 240px
            background: #f3f4f6
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden}

        .camera-feed video {width: 100%
            height: 100%
            object-fit: cover
            border-radius: 10px}

        .camera-feed img {width: 100%
            height: 100%
            object-fit: cover
            border-radius: 10px}

        .camera-controls {display: flex
            gap: 10px
            margin-bottom: 15px}

        .btn {padding: 8px 16px
            border: none
            border-radius: 8px
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease}

        .btn-primary {background: #667eea
            color: white}

        .btn-success {background: #10b981
            color: white}

        .btn-warning {background: #f59e0b
            color: white}

        .btn-danger {background: #ef4444
            color: white}

        .btn: hover {opacity: 0.9
            transform: translateY(-1px)}

        .camera-info {font-size: 12px
            color: #666
            line-height: 1.4}

        .add-camera-card {background: linear-gradient(135deg, #667eea, #764ba2)
            color: white
            display: flex
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 360px;
            cursor: pointer;
            transition: transform 0.3s ease}

        .add-camera-card:hover {transform: translateY(-5px)}

        .add-camera-icon {font-size: 48px
            margin-bottom: 15px}

        .back-btn {position: fixed
            top: 20px
            left: 20px
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease}

        .back-btn:hover {transform: translateY(-2px)
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15)}

        .camera-modal {display: none
            position: fixed
            top: 0
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000}

        .modal-content {position: relative
            top: 50%
            left: 50%
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%}

        .modal-header {display: flex
            justify-content: space-between
            align-items: center
            margin-bottom: 20px}

        .modal-title {font-size: 24px
            font-weight: 600
            color: #333}

        .close-btn {background: none
            border: none
            font-size: 24px
            cursor: pointer;
            color: #666}

        .form-group {margin-bottom: 20px}

        .form-group label {display: block
            margin-bottom: 5px
            font-weight: 600
            color: #333}

        .form-group input,
        .form-group select {width: 100%
            padding: 12px
            border: 2px solid #e5e7eb
            border-radius: 8px;
            font-size: 16px}

        .form-group input:focus,
        .form-group select: focus {outline: none
            border-color: #667eea}

        @media (max-width: 768px) {.camera-grid {
                grid-template-columns: 1fr}
            
            .branch-grid {grid-template-columns: repeat(2, 1fr)}
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='/main_dashboard'">← Dashboard</button>

    <div class="container">
        <div class="header">
            <h1>📹 Branch Security Cameras</h1>
            <p>Monitor and manage security cameras across your branches</p>
        </div>

        <div class="branch-selector">
            <h3>🏢 Select Branch to Monitor</h3>
            <div class="branch-grid" id="branchGrid">
                <button class="branch-btn active" onclick="selectBranch('main', this)">Main HQ</button>
                <button class="branch-btn" onclick="selectBranch('north', this)">North Branch</button>
                <button class="branch-btn" onclick="selectBranch('south', this)">South Branch</button>
                <button class="branch-btn" onclick="selectBranch('east', this)">East Branch</button>
                <button class="branch-btn" onclick="selectBranch('west', this)">West Branch</button>
                <button class="branch-btn" onclick="selectBranch('central', this)">Central Branch</button>
            </div>
        </div>

        <div id="camera-section">
            <div class="camera-grid" id="cameraGrid">
                <!-- Cameras will be populated here -->
            </div>
        </div>
    </div>

    <!-- Add Camera Modal -->
    <div id="addCameraModal" class="camera-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">📹 Add New Camera</h3>
                <button class="close-btn" onclick="closeAddCameraModal()">&times;</button>
            </div>
            <form id="addCameraForm" onsubmit="addCamera(event)">
                <div class="form-group">
                    <label>Camera Name</label>
                    <input type="text" id="cameraName" required placeholder="e.g., Warehouse Entry">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <select id="cameraLocation" required>
                        <option value="">Select Location</option>
                        <option value="entrance">Main Entrance</option>
                        <option value="warehouse">Warehouse Floor</option>
                        <option value="loading">Loading Dock</option>
                        <option value="parking">Parking Area</option>
                        <option value="office">Office Area</option>
                        <option value="break_room">Break Room</option>
                        <option value="storage">Storage Area</option>
                        <option value="shipping">Shipping Area</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Camera IP Address</label>
                    <input type="text" id="cameraIP" required placeholder="192.168.1.100">
                </div>
                <div class="form-group">
                    <label>Camera Type</label>
                    <select id="cameraType" required>
                        <option value="">Select Type</option>
                        <option value="ip">IP Camera</option>
                        <option value="wireless">Wireless Camera</option>
                        <option value="ptz">PTZ Camera</option>
                        <option value="dome">Dome Camera</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Add Camera</button>
                    <button type="button" class="btn btn-danger" onclick="closeAddCameraModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentBranch = 'main';
        let branchCameras = {};

        // Initialize with demo camera data
        const demoCameras = {
            'main': [
                {
                    id: 'cam-main-001',
                    name: 'Main Entrance',
                    location: 'entrance',
                    ip: '192.168.1.101',
                    type: 'ip',
                    status: 'online',
                    feed: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&h=240&fit=crop'
                },
                {
                    id: 'cam-main-002',
                    name: 'Warehouse Floor',
                    location: 'warehouse',
                    ip: '192.168.1.102',
                    type: 'ptz',
                    status: 'online',
                    feed: 'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=400&h=240&fit=crop'
                },
                {
                    id: 'cam-main-003',
                    name: 'Loading Dock',
                    location: 'loading',
                    ip: '192.168.1.103',
                    type: 'dome',
                    status: 'maintenance',
                    feed: null
                }
            ],
            'north': [
                {
                    id: 'cam-north-001',
                    name: 'North Entrance',
                    location: 'entrance',
                    ip: '192.168.2.101',
                    type: 'ip',
                    status: 'online',
                    feed: 'https://images.unsplash.com/photo-1497366811353-6870744d04b2?w=400&h=240&fit=crop'
                },
                {
                    id: 'cam-north-002',
                    name: 'Parking Area',
                    location: 'parking',
                    ip: '192.168.2.102',
                    type: 'wireless',
                    status: 'offline',
                    feed: null
                }
            ],
            'south': [
                {
                    id: 'cam-south-001',
                    name: 'South Main Gate',
                    location: 'entrance',
                    ip: '192.168.3.101',
                    type: 'ip',
                    status: 'online',
                    feed: 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=400&h=240&fit=crop'
                }
            ],
            'east': [],
            'west': [],
            'central': []
        };

        // Initialize branch cameras
        branchCameras = demoCameras;

        function selectBranch(branchId, buttonElement) {// Update active button
            document.querySelectorAll('.branch-btn').forEach(btn => btn.classList.remove('active'))
            buttonElement.classList.add('active')
            
            currentBranch = branchId
            loadCameras();}

        function loadCameras() {const cameras = branchCameras[currentBranch] || []
            const cameraGrid = document.getElementById('cameraGrid')
            
            cameraGrid.innerHTML = ''

            // Add existing cameras
            cameras.forEach(camera => {
                const cameraCard = createCameraCard(camera);
                cameraGrid.appendChild(cameraCard);});

            // Add "Add Camera" card
            const addCameraCard = createAddCameraCard();
            cameraGrid.appendChild(addCameraCard);
        }

        function createCameraCard(camera) {const card = document.createElement('div')
            card.className = 'camera-card'
            card.innerHTML = `
                <div class="camera-header">
                    <div class="camera-title">📹 ${camera.name}</div>
                    <div class="camera-status status-${camera.status}">${camera.status}</div>
                </div>
                <div class="camera-feed">
                    ${camera.feed && camera.status === 'online' }
                        ? `<img src="${camera.feed}" alt="${camera.name} Feed">`
                        : `<div style="color: #666; text-align: center;">
                             ${camera.status === 'offline' ? '📡 Camera Offline' : }
                               camera.status === 'maintenance' ? '🔧 Under Maintenance' : 
                               '📹 No Feed Available'}
                           </div>`
                    }
                </div>
                <div class="camera-controls">
                    <button class="btn btn-primary" onclick="viewFullscreen('${camera.id}')">🔍 View</button>
                    <button class="btn btn-success" onclick="recordCamera('${camera.id}')">⏺️ Record</button>
                    <button class="btn btn-warning" onclick="configureCamera('${camera.id}')">⚙️ Config</button>
                    <button class="btn btn-danger" onclick="removeCamera('${camera.id}')">🗑️ Remove</button>
                </div>
                <div class="camera-info">
                    📍 Location: ${formatLocation(camera.location)}<br>
                    🌐 IP: ${camera.ip}<br>
                    📹 Type: ${camera.type.toUpperCase()}<br>
                    ⏰ Last seen: ${camera.status === 'online' ? 'Now' : '2 hours ago'}
                </div>
            `;
            return card;
        }

        function createAddCameraCard() {const card = document.createElement('div')
            card.className = 'camera-card add-camera-card'
            card.onclick = openAddCameraModal
            card.innerHTML = `
                <div class="add-camera-icon">➕</div>
                <h3>Add New Camera</h3>
                <p>Click to add a security camera to this branch</p>
            `;
            return card;}

        function formatLocation(location) {
            const locationMap = {
                'entrance': 'Main Entrance',
                'warehouse': 'Warehouse Floor',
                'loading': 'Loading Dock',
                'parking': 'Parking Area',
                'office': 'Office Area',
                'break_room': 'Break Room',
                'storage': 'Storage Area',
                'shipping': 'Shipping Area'
            };
            return locationMap[location] || location;
        }

        function openAddCameraModal() {document.getElementById('addCameraModal').style.display = 'block'}

        function closeAddCameraModal() {document.getElementById('addCameraModal').style.display = 'none'
            document.getElementById('addCameraForm').reset()}

        function addCamera(event) {event.preventDefault()
            
            const name = document.getElementById('cameraName').value
            const location = document.getElementById('cameraLocation').value
            const ip = document.getElementById('cameraIP').value;
            const type = document.getElementById('cameraType').value;

            const newCamera = {
                id: `cam-${currentBranch}-${Date.now()}`,
                name: name,
                location: location,
                ip: ip,
                type: type,
                status: 'online',
                feed: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&h=240&fit=crop' // Demo feed
            };

            if (!branchCameras[currentBranch]) {branchCameras[currentBranch] = []}
            
            branchCameras[currentBranch].push(newCamera);
            
            // Save to backend
            saveCameraConfiguration();
            
            closeAddCameraModal();
            loadCameras();
            
            alert(`Camera "${name}" added successfully!`);
        }

        function viewFullscreen(cameraId) {const camera = findCameraById(cameraId)
            if (camera && camera.feed) {
                const modal = document.createElement('div')
                modal.className = 'camera-modal'
                modal.style.display = 'block';
                modal.innerHTML = `
                    <div style="position: relative top: 50% left: 50% transform: translate(-50%, -50%); max-width: 90%; max-height: 90%;">
                        <div style="position: relative;">
                            <img src="${camera.feed}" style="width: 100%; border-radius: 15px;">
                            <button onclick="this.parentElement.parentElement.parentElement.remove()" 
                                    style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 20px;">&times;</button>
                            <div style="position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px;">
                                📹 ${camera.name} - Live Feed
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            } else {alert('Camera feed not available')}
        }

        function recordCamera(cameraId) {const camera = findCameraById(cameraId)
            if (camera) {
                alert(`Recording started for ${camera.name}. Recording will be saved to the security archive.`);
            }
        }

        function configureCamera(cameraId) {const camera = findCameraById(cameraId)
            if (camera) {
                alert(`Opening configuration panel for ${camera.name} (${camera.ip})`);
            }
        }

        function removeCamera(cameraId) {if (confirm('Are you sure you want to remove this camera?')) {
                const cameras = branchCameras[currentBranch] || []
                branchCameras[currentBranch] = cameras.filter(cam => cam.id !== cameraId)
                saveCameraConfiguration()
                loadCameras();
                alert('Camera removed successfully');}
        }

        function findCameraById(cameraId) {const cameras = branchCameras[currentBranch] || []
            return cameras.find(cam => cam.id === cameraId)}

        async function saveCameraConfiguration() {
            try {
                const response = await fetch('/api/security/cameras', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        branch: currentBranch,
                        cameras: branchCameras[currentBranch]
                    })
                });
                
                if (!response.ok) {console.error('Failed to save camera configuration')}
            } catch (error) {console.error('Error saving camera configuration:', error)}
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {loadCameras()});

        // Close modal when clicking outside
        window.onclick = function(event) {const modal = document.getElementById('addCameraModal')
            if (event.target === modal) {
                closeAddCameraModal()}
        }
    </script>

    <!-- Include Universal Dashboard Button -->
    <script src="/static/universal_dashboard_button.js"></script>
    <!-- Include Employee Messaging Widget -->
    <script src="/static/employee_messaging_widget.js"></script>
</body>
</html>
